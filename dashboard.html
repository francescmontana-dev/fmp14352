<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tauler Meteo Masnou</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

h1{
margin:0 0 10px 0;
font-size:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.kpi{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
}

.kpi-title{
font-size:12px;
opacity:0.8;
}

.kpi-value{
font-size:20px;
font-weight:bold;
}

canvas{
background:#1e293b;
border-radius:12px;
padding:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h1>🌦️ El Masnou - NE</h1>
<div id="status">Carregant dades...</div>
</div>

<div class="card grid">

<div class="kpi">
<div class="kpi-title">Temperatura</div>
<div class="kpi-value" id="temp">--</div>
</div>

<div class="kpi">
<div class="kpi-title">Humitat</div>
<div class="kpi-value" id="hum">--</div>
</div>

<div class="kpi">
<div class="kpi-title">Vent</div>
<div class="kpi-value" id="wind">--</div>
</div>

<div class="kpi">
<div class="kpi-title">Pluja avui</div>
<div class="kpi-value" id="rain">--</div>
</div>

</div>

<div class="card">
<canvas id="tempChart"></canvas>
</div>

</div>

<script>

const DATA_BASE="https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec"

function loadJSONP(url){
const s=document.createElement("script")
s.src=url+"&_="+Date.now()
document.body.appendChild(s)
}

function cbCurrent(data){

const obs=data.obs

document.getElementById("temp").textContent=obs.temp+"°C"
document.getElementById("hum").textContent=obs.rh+"%"
document.getElementById("wind").textContent=Math.round(obs.wind_kmh)+" km/h"
document.getElementById("rain").textContent=obs.rain_day_mm+" mm"

document.getElementById("status").textContent="Dades actualitzades"

}

function cbForecast(data){

const hours=data.hourly.slice(0,24)

const labels=hours.map(h=>new Date(h.t).getHours()+":00")
const temps=hours.map(h=>h.temp)

new Chart(document.getElementById("tempChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Temperatura °C",
data:temps,
borderWidth:2,
tension:0.3
}]
},

options:{
responsive:true,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}

})

}

loadJSONP(DATA_BASE+"?out=current&callback=cbCurrent")
loadJSONP(DATA_BASE+"?out=forecast&callback=cbForecast")

</script>

</body>
</html>
