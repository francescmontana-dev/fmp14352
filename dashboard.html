<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tauler Meteo — El Masnou</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --bg:#0b1020;
      --card:#111827;
      --muted:#94a3b8;
      --text:#e5e7eb;
      --grid:rgba(255,255,255,.06);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      background:linear-gradient(180deg,#0b1020 0%, #0f172a 45%, #0b1020 100%);
      color:var(--text);
      padding:12px;
    }
    .wrap{max-width:980px;margin:auto;}
    .top{
      display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;
      margin-bottom:10px;
    }
    .card{
      background:rgba(17,24,39,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:12px;
      box-shadow:0 14px 34px rgba(0,0,0,.28);
    }
    .brand{
      flex:1 1 260px;
      display:flex;flex-direction:column;gap:6px;
    }
    .brand h1{
      margin:0;
      font-size:18px;
      font-weight:950;
      letter-spacing:.2px;
    }
    .meta{font-size:12px;color:var(--muted);line-height:1.3;}

    .alert{
      margin-top:8px;
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(96,165,250,.18);
      border:1px solid rgba(96,165,250,.35);
      font-weight:900;
      font-size:12px;
      width:fit-content;
    }

    .kpis{
      flex:2 1 520px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
    }
    .kpi{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:10px;
      min-height:74px;
    }
    .kpi .k{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:800;}
    .kpi .v{font-size:18px;font-weight:950;line-height:1.1;}
    .kpi .s{font-size:11px;color:var(--muted);margin-top:4px;}

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .chartCard{padding:12px;}
    .chartTitle{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .chartTitle h2{
      margin:0;font-size:14px;font-weight:950;
    }
    .chartTitle span{
      font-size:12px;color:var(--muted);
    }
    .canvasWrap{
      position:relative;
      height:260px;
      width:100%;
    }

    @media (max-width: 720px){
      .kpis{grid-template-columns:repeat(2,minmax(0,1fr));}
      .canvasWrap{height:240px;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="card brand">
        <h1>🌦️ El Masnou - NE · Tauler Meteo</h1>
        <div class="meta" id="metaLine">Carregant dades…</div>
        <div class="alert" id="situation">⏳ Preparant gràfics…</div>
      </div>

      <div class="card kpis" aria-label="Dades actuals">
        <div class="kpi">
          <div class="k">Temperatura (OBS)</div>
          <div class="v" id="kTemp">—</div>
          <div class="s" id="kDeltaT">Δ —</div>
        </div>

        <div class="kpi">
          <div class="k">Humitat (OBS)</div>
          <div class="v" id="kRH">—</div>
          <div class="s" id="kDeltaRH">Δ —</div>
        </div>

        <div class="kpi">
          <div class="k">Vent (OBS)</div>
          <div class="v" id="kWind">—</div>
          <div class="s" id="kGust">Ratxa —</div>
        </div>

        <div class="kpi">
          <div class="k">Pluja</div>
          <div class="v" id="kRain">—</div>
          <div class="s" id="kRainSoon">3h —</div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card chartCard">
        <div class="chartTitle">
          <h2>Temperatura (pròximes 48 h)</h2>
          <span id="tNote">—</span>
        </div>
        <div class="canvasWrap"><canvas id="cTemp"></canvas></div>
      </div>

      <div class="card chartCard">
        <div class="chartTitle">
          <h2>Pluja (mm/h) i Vent (km/h) · 48 h</h2>
          <span id="rwNote">—</span>
        </div>
        <div class="canvasWrap"><canvas id="cRainWind"></canvas></div>
      </div>

      <div class="card chartCard">
        <div class="chartTitle">
          <h2>Humitat relativa (%) · 48 h</h2>
          <span id="rhNote">—</span>
        </div>
        <div class="canvasWrap"><canvas id="cRH"></canvas></div>
      </div>
    </div>
  </div>

<script>
  /********************* CONFIG *********************/
  // 🔴 POSA AQUÍ LA TEVA URL BASE (acaba amb /exec)
  const DATA_BASE = "https://script.google.com/macros/library/d/1niytBHzMezQZYOA_qkPdWvOf_nU05gxa-jLiq_weRbh_o46wuI4n5-eX/5";

  const END_CURRENT  = `${DATA_BASE}?out=current&callback=cbCurrent`;
  const END_FORECAST = `${DATA_BASE}?out=forecast&callback=cbForecast`;

  /********************* FORMATS *********************/
  const fmt1 = (x) => (x === null || x === undefined || Number.isNaN(x)) ? "—" : (Math.round(x*10)/10).toFixed(1);
  const fmt0 = (x) => (x === null || x === undefined || Number.isNaN(x)) ? "—" : String(Math.round(x));

  function hhmm(iso){
    if(!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"});
  }
  function ddhh(iso){
    if(!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleString("ca-ES",{weekday:"short", hour:"2-digit", minute:"2-digit"});
  }

  /********************* SITUACIÓ *********************/
  function situacioText(current){
    const rain3 = current?.derived?.rain_3h_mm ?? 0;
    const gust = current?.obs?.gust_kmh;
    const wind6 = current?.derived?.wind6_max_kmh;

    if (rain3 >= 1) return `🌧️ Pluja probable en breu (${fmt1(rain3)} mm en 3 h)`;
    if (gust !== null && gust >= 50) return `⚠️ Ratxes fortes ara mateix (${fmt0(gust)} km/h)`;
    if (wind6 !== null && wind6 >= 45) return `⚠️ Vent destacable previst (${fmt0(wind6)} km/h en 6 h)`;
    return "☀️ Situació estable al Masnou";
  }

  /********************* JSONP LOADER *********************/
  function loadJSONP(url) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = url + "&_=" + Date.now();
      s.async = true;
      s.onload = () => resolve(true);
      s.onerror = () => reject(new Error("JSONP error"));
      document.body.appendChild(s);
    });
  }

  let _current = null;
  let _forecast = null;

  // callbacks globals (necessaris per JSONP)
  window.cbCurrent = (data) => {
    _current = data;
    maybeRender_();
  };

  window.cbForecast = (data) => {
    _forecast = data;
    maybeRender_();
  };

  function maybeRender_(){
    if(!_current || !_forecast) return;

    renderKPIs_(_current);
    renderCharts_(_forecast);

    const updated = _current?.source?.forecast_updated_at || _forecast?.updated_at || "";
    document.getElementById("metaLine").textContent =
      `Actualitzat: ${new Date().toLocaleString("ca-ES")} · Met.no: ${updated}`;

    document.getElementById("situation").textContent = situacioText(_current);
  }

  function loadData_(){
    Promise.all([
      loadJSONP(END_CURRENT),
      loadJSONP(END_FORECAST)
    ]).catch(err => {
      document.getElementById("metaLine").textContent = "Error carregant dades.";
      document.getElementById("situation").textContent = "❌ No s'han pogut carregar les dades";
      console.error(err);
    });
  }

  /********************* KPIs *********************/
  function renderKPIs_(current){
    const obs = current?.obs || {};
    const prev = current?.prev_now || {};

    const dT  = (obs.temp !== null && prev.temp !== null) ? (obs.temp - prev.temp) : null;
    const dRH = (obs.rh !== null && prev.rh !== null) ? (obs.rh - prev.rh) : null;

    document.getElementById("kTemp").textContent = `${fmt1(obs.temp)}°C`;
    document.getElementById("kRH").textContent   = `${fmt0(obs.rh)}%`;
    document.getElementById("kWind").textContent = `${fmt0(obs.wind_kmh)} km/h`;
    document.getElementById("kGust").textContent = `Ratxa ${fmt0(obs.gust_kmh)} km/h`;
    document.getElementById("kRain").textContent = `${fmt1(obs.rain_day_mm)} mm`;
    document.getElementById("kRainSoon").textContent = `3h ${fmt1(current?.derived?.rain_3h_mm)} mm`;

    document.getElementById("kDeltaT").textContent  = `Δ ${dT === null ? "—" : (dT>0?"+":"") + fmt1(dT)}°C`;
    document.getElementById("kDeltaRH").textContent = `Δ ${dRH === null ? "—" : (dRH>0?"+":"") + fmt0(dRH)}%`;
  }

  /********************* CHARTS *********************/
  function slice48h_(hourly){
    const max = Math.min(hourly.length, 48);
    return hourly.slice(0, max);
  }

  let chartTemp, chartRainWind, chartRH;

  function renderCharts_(forecast){
    const hourly = Array.isArray(forecast?.hourly) ? forecast.hourly : [];
    if(!hourly.length){
      document.getElementById("tNote").textContent = "sense dades";
      document.getElementById("rwNote").textContent = "sense dades";
      document.getElementById("rhNote").textContent = "sense dades";
      return;
    }

    const h48 = slice48h_(hourly);
    const labels = h48.map(p => ddhh(p.t));
    const temp = h48.map(p => p.temp);
    const rain = h48.map(p => p.rain_mm);
    const wind = h48.map(p => p.wind_kmh);
    const rh = h48.map(p => p.rh);

    document.getElementById("tNote").textContent  = `de ${hhmm(h48[0]?.t)} a ${hhmm(h48[h48.length-1]?.t)}`;
    document.getElementById("rwNote").textContent = `48 h · mm/h i km/h`;
    document.getElementById("rhNote").textContent = `48 h`;

    if(chartTemp) chartTemp.destroy();
    if(chartRainWind) chartRainWind.destroy();
    if(chartRH) chartRH.destroy();

    chartTemp = new Chart(document.getElementById("cTemp"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Temperatura (°C)",
          data: temp,
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2
        }]
      },
      options: commonOpts_({yTitle:"°C"})
    });

    chartRainWind = new Chart(document.getElementById("cRainWind"), {
      data: {
        labels,
        datasets: [
          {
            type: "bar",
            label: "Pluja (mm/h)",
            data: rain,
            borderWidth: 0
          },
          {
            type: "line",
            label: "Vent (km/h)",
            data: wind,
            tension: 0.35,
            pointRadius: 0,
            borderWidth: 2,
            yAxisID: "y2"
          }
        ]
      },
      options: commonOpts_({yTitle:"mm/h", y2Title:"km/h", dualAxis:true})
    });

    chartRH = new Chart(document.getElementById("cRH"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Humitat (%)",
          data: rh,
          tension: 0.35,
          pointRadius: 0,
          borderWidth: 2
        }]
      },
      options: commonOpts_({yTitle:"%"})
    });
  }

  function commonOpts_({yTitle, y2Title, dualAxis=false}){
    const scales = {
      x: {
        ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12, color: "rgba(229,231,235,.72)" },
        grid: { color: "rgba(255,255,255,.06)" }
      },
      y: {
        title: { display: !!yTitle, text: yTitle, color: "rgba(229,231,235,.85)", font:{weight:"800"} },
        ticks: { color: "rgba(229,231,235,.72)" },
        grid: { color: "rgba(255,255,255,.06)" }
      }
    };

    if(dualAxis){
      scales.y2 = {
        position: "right",
        title: { display: !!y2Title, text: y2Title, color: "rgba(229,231,235,.85)", font:{weight:"800"} },
        ticks: { color: "rgba(229,231,235,.72)" },
        grid: { drawOnChartArea:false }
      };
    }

    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: "rgba(229,231,235,.85)", font:{weight:"800"} } },
        tooltip: { mode: "index", intersect: false }
      },
      interaction: { mode: "index", intersect: false },
      scales
    };
  }

  /********************* START *********************/
  loadData_();
</script>
</body>
</html>
