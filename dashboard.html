<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test JSONP El Masnou</title>
  <style>
    body{
      font-family:system-ui,Arial,sans-serif;
      background:#0f172a;
      color:#e5e7eb;
      margin:0;
      padding:16px;
    }
    .box{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:14px;
      margin-bottom:12px;
    }
    .ok{color:#22c55e}
    .warn{color:#f59e0b}
    .err{color:#ef4444}
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      font-size:12px;
      line-height:1.35;
      background:#020617;
      padding:12px;
      border-radius:10px;
      overflow:auto;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2 style="margin-top:0">Test JSONP</h2>
    <div id="status" class="warn">Iniciant…</div>
  </div>

  <div class="box">
    <h3 style="margin-top:0">Current</h3>
    <pre id="outCurrent">esperant…</pre>
  </div>

  <div class="box">
    <h3 style="margin-top:0">Forecast</h3>
    <pre id="outForecast">esperant…</pre>
  </div>

  <div class="box">
    <h3 style="margin-top:0">Log</h3>
    <pre id="log">arrencant…</pre>
  </div>

<script>
const DATA_BASE = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
const END_CURRENT  = `${DATA_BASE}?out=current&callback=cbCurrent`;
const END_FORECAST = `${DATA_BASE}?out=forecast&callback=cbForecast`;

let gotCurrent = false;
let gotForecast = false;

function log(msg){
  const el = document.getElementById("log");
  el.textContent += "\n" + msg;
}

function updateStatus(){
  const st = document.getElementById("status");
  if (gotCurrent && gotForecast){
    st.textContent = "OK: current i forecast rebuts";
    st.className = "ok";
  } else if (gotCurrent || gotForecast){
    st.textContent = `Parcial: current=${gotCurrent} forecast=${gotForecast}`;
    st.className = "warn";
  } else {
    st.textContent = "Esperant callbacks…";
    st.className = "warn";
  }
}

function loadJSONP(url){
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  s.async = true;

  s.onload = function(){
    log("script carregat: " + s.src);
  };

  s.onerror = function(){
    log("ERROR carregant script: " + s.src);
    document.getElementById("status").textContent = "Error carregant script JSONP";
    document.getElementById("status").className = "err";
  };

  document.head.appendChild(s);
  log("injectat: " + s.src);
}

window.cbCurrent = function(data){
  gotCurrent = true;
  document.getElementById("outCurrent").textContent = JSON.stringify(data, null, 2);
  log("cbCurrent executat");
  updateStatus();
};

window.cbForecast = function(data){
  gotForecast = true;
  document.getElementById("outForecast").textContent = JSON.stringify(data, null, 2);
  log("cbForecast executat");
  updateStatus();
};

window.addEventListener("error", function(e){
  log("JS ERROR: " + e.message);
});

updateStatus();
loadJSONP(END_CURRENT);
loadJSONP(END_FORECAST);

setTimeout(function(){
  if (!gotCurrent || !gotForecast){
    log("TIMEOUT 10s: current=" + gotCurrent + " forecast=" + gotForecast);
    const st = document.getElementById("status");
    st.textContent = "Timeout: no han arribat tots els callbacks";
    st.className = "err";
  }
}, 10000);
</script>
</body>
</html>
