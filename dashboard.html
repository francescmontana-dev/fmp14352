<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tauler Meteo — El Masnou</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --bg:#0b1020;
      --card:#111827;
      --muted:#94a3b8;F
      --text:#e5e7eb;
      --grid:rgba(255,255,255,.06);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      background:linear-gradient(180deg,#0b1020 0%, #0f172a 45%, #0b1020 100%);
      color:var(--text);
      padding:12px;
    }
    .wrap{max-width:980px;margin:auto;}

    .card{
      background:rgba(17,24,39,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:12px;
      box-shadow:0 14px 34px rgba(0,0,0,.28);
      margin-bottom:8px;
    }

    .top{
      display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;
    }
    .brand{flex:1 1 260px;display:flex;flex-direction:column;gap:6px;}
    .brand h1{margin:0;font-size:22px;font-weight:950;letter-spacing:.2px;}
    .meta{font-size:12px;color:var(--muted);line-height:1.3;}

    .pillRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(96,165,250,.18);
      border:1px solid rgba(96,165,250,.35);
      font-weight:900;
      font-size:12px;
      width:fit-content;
      color:var(--text);
      text-decoration:none;
    }

    .kpis{
      flex:2 1 520px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
    }
    .kpi{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:10px;
      min-height:74px;
    }
    .kpi .k{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:800;}
    .kpi .v{font-size:18px;font-weight:950;line-height:1.1;}
    .kpi .s{font-size:11px;color:var(--muted);margin-top:4px;}

    .chartTitle{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .chartTitle h2{
      margin:0;font-size:13px;font-weight:900;
    }
    .chartTitle span{
      font-size:12px;color:var(--muted);
    }
    .canvasWrap{position:relative;height:210px;width:100%;}
@media (max-width: 720px){
  .kpis{grid-template-columns:repeat(2,minmax(0,1fr));}
  .canvasWrap{height:190px;}
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="card top">
      <div class="brand">
        <h1>🌦️ El Masnou - NE · Gràfiques</h1>
        <div id="currentBig" style="margin-top:4px;line-height:1.2;">—</div>
        <div class="meta" id="metaLine">Carregant dades…</div>

        <div class="pillRow">
          <span class="pill" id="statusPill">⏳ Preparant gràfiques…</span>
          <a class="pill" href="./taula.html">📋 Veure taula 72 h</a>
        </div>
      </div>

      <div class="kpis" aria-label="Dades actuals">
        <div class="kpi"><div class="k">Temperatura (OBS)</div><div class="v" id="kTemp">—</div><div class="s" id="kDeltaT">Δ —</div></div>
        <div class="kpi"><div class="k">Humitat (OBS)</div><div class="v" id="kRH">—</div><div class="s" id="kDeltaRH">Δ —</div></div>
        <div class="kpi"><div class="k">Vent (OBS)</div><div class="v" id="kWind">—</div><div class="s" id="kGust">Ratxa —</div></div>
        <div class="kpi"><div class="k">Pluja</div><div class="v" id="kRain">—</div><div class="s" id="kRainSoon">3h —</div></div>
      </div>
    </div>

    <div class="card">
      <div class="chartTitle">
        <h2>Temperatura · 48h</h2>
        <span id="tNote">—</span>
      </div>
      <div class="canvasWrap"><canvas id="cTemp"></canvas></div>
    </div>

    <div class="card">
      <div class="chartTitle">
        <h2>Pluja + Vent · 48h</h2>
        <span id="rwNote">—</span>
      </div>
      <div class="canvasWrap"><canvas id="cRainWind"></canvas></div>
    </div>

    <div class="card">
      <div class="chartTitle">
        <h2>Humitat · 48h</h2>
        <span id="rhNote">—</span>
      </div>
      <div class="canvasWrap"><canvas id="cRH"></canvas></div>
    </div>

  </div>

<script>
  /********** CONFIG **********/
  const DATA_BASE = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
  const END_CURRENT  = `${DATA_BASE}?out=current&callback=cbCurrent`;
  const END_FORECAST = `${DATA_BASE}?out=forecast&callback=cbForecast`;

  /********** UTIL **********/
  const fmt1 = (x) => (x === null || x === undefined || Number.isNaN(x)) ? "—" : (Math.round(x*10)/10).toFixed(1);
  const fmt0 = (x) => (x === null || x === undefined || Number.isNaN(x)) ? "—" : String(Math.round(x));
  const hhmm = (iso) => iso ? new Date(iso).toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"}) : "—";
  const ddhh = (iso) => iso ? new Date(iso).toLocaleString("ca-ES",{weekday:"short", hour:"2-digit", minute:"2-digit"}) : "—";

  function loadJSONP(url){
    const s = document.createElement("script");
    s.src = url + "&_=" + Date.now();
    s.async = true;
    s.onerror = () => {
      document.getElementById("statusPill").textContent = "❌ Error carregant dades (JSONP)";
    };
    document.body.appendChild(s);
  }

  let gotCurrent = false;
  let gotForecast = false;

  function updateStatus(){
    const pill = document.getElementById("statusPill");
    if(gotCurrent && gotForecast) pill.textContent = "✅ Gràfiques actualitzades";
    else if(gotCurrent && !gotForecast) pill.textContent = "⏳ Dades actuals OK… (esperant previsió)";
    else if(!gotCurrent && gotForecast) pill.textContent = "⏳ Previsió OK… (esperant dades actuals)";
    else pill.textContent = "⏳ Preparant gràfiques…";function dirText8_(deg){
  if(deg === null || deg === undefined || Number.isNaN(deg)) return "—";
  const d = ((deg % 360) + 360) % 360;
  const dirs = ["N","NE","E","SE","S","SO","O","NO"];
  const idx = Math.round(d / 45) % 8;
  return dirs[idx];
}
function dirArrow_(deg){
  if(deg === null || deg === undefined || Number.isNaN(deg)) return "";
  const d = ((deg % 360) + 360) % 360;
  if (d >= 337.5 || d < 22.5)   return "↑";
  if (d >= 22.5  && d < 67.5)   return "↗";
  if (d >= 67.5  && d < 112.5)  return "→";
  if (d >= 112.5 && d < 157.5)  return "↘";
  if (d >= 157.5 && d < 202.5)  return "↓";
  if (d >= 202.5 && d < 247.5)  return "↙";
  if (d >= 247.5 && d < 292.5)  return "←";
  return "↖";
}function dirText8_(deg){
  if(deg === null || deg === undefined || Number.isNaN(deg)) return "—";
  const d = ((deg % 360) + 360) % 360;
  const dirs = ["N","NE","E","SE","S","SO","O","NO"];
  const idx = Math.round(d / 45) % 8;
  return dirs[idx];
}
function dirArrow_(deg){
  if(deg === null || deg === undefined || Number.isNaN(deg)) return "";
  const d = ((deg % 360) + 360) % 360;
  if (d >= 337.5 || d < 22.5)   return "↑";
  if (d >= 22.5  && d < 67.5)   return "↗";
  if (d >= 67.5  && d < 112.5)  return "→";
  if (d >= 112.5 && d < 157.5)  return "↘";
  if (d >= 157.5 && d < 202.5)  return "↓";
  if (d >= 202.5 && d < 247.5)  return "↙";
  if (d >= 247.5 && d < 292.5)  return "←";
  return "↖";
}
  }

  /********** KPIs **********/
  function renderKPIs(current){

  const obs = current?.obs || {};
  const prev = current?.prev_now || {};

  const dT  = (obs.temp !== null && prev.temp !== null) ? (obs.temp - prev.temp) : null;
  const dRH = (obs.rh !== null && prev.rh !== null) ? (obs.rh - prev.rh) : null;

  document.getElementById("kTemp").textContent = `${fmt1(obs.temp)}°C`;
  document.getElementById("kRH").textContent   = `${fmt0(obs.rh)}%`;
  document.getElementById("kWind").textContent = `${fmt0(obs.wind_kmh)} km/h`;
  document.getElementById("kGust").textContent = `Ratxa ${fmt0(obs.gust_kmh)} km/h`;
  document.getElementById("kRain").textContent = `${fmt1(obs.rain_day_mm)} mm`;
  document.getElementById("kRainSoon").textContent = `3h ${fmt1(current?.derived?.rain_3h_mm)} mm`;

  document.getElementById("kDeltaT").textContent  = `Δ ${dT === null ? "—" : (dT>0?"+":"") + fmt1(dT)}°C`;
  document.getElementById("kDeltaRH").textContent = `Δ ${dRH === null ? "—" : (dRH>0?"+":"") + fmt0(dRH)}%`;

  // icona simple
  let icon = "🌤️";
  if ((current?.derived?.rain_3h_mm ?? 0) >= 0.2) icon = "🌧️";
  if ((obs.wind_kmh ?? 0) >= 30) icon = "💨";

  const dirTxt = dirText8_(obs.wdir_deg);
  const dirArr = dirArrow_(obs.wdir_deg);

  document.getElementById("currentBig").innerHTML =
    icon + " <span style='font-size:20px;font-weight:900;'>" + fmt1(obs.temp) + "°C</span><br>" +
    "<span style='font-size:13px;'>Vent " + dirTxt + " " + dirArr + " " + fmt0(obs.wind_kmh) + " km/h</span>";
}

  /********** CHARTS **********/
  let chartTemp, chartRainWind, chartRH;

  function renderCharts48(forecast){
    const hourly = Array.isArray(forecast?.hourly) ? forecast.hourly : [];
    const h48 = hourly.slice(0, 48);
    if(!h48.length) return;

    const labels = h48.map(p => ddhh(p.t));
    const temp = h48.map(p => p.temp);
    const rain = h48.map(p => p.rain_mm);
    const wind = h48.map(p => p.wind_kmh);
    const rh = h48.map(p => p.rh);

    document.getElementById("tNote").textContent  = `de ${hhmm(h48[0].t)} a ${hhmm(h48[h48.length-1].t)}`;
    document.getElementById("rwNote").textContent = `48 h · mm/h i km/h`;
    document.getElementById("rhNote").textContent = `48 h`;

    if(chartTemp) chartTemp.destroy();
    if(chartRainWind) chartRainWind.destroy();
    if(chartRH) chartRH.destroy();

    chartTemp = new Chart(document.getElementById("cTemp"), {
      type:"line",
      data:{ labels, datasets:[{ label:"Temperatura (°C)", data:temp, borderWidth:2, tension:0.35, pointRadius:0 }]},
      options: commonOpts({yTitle:"°C"})
    });

    chartRainWind = new Chart(document.getElementById("cRainWind"), {
      data:{
        labels,
        datasets:[
          { type:"bar",  label:"Pluja (mm/h)", data:rain, borderWidth:0 },
          { type:"line", label:"Vent (km/h)",  data:wind, yAxisID:"y2", borderWidth:2, tension:0.35, pointRadius:0 }
        ]
      },
      options: commonOpts({yTitle:"mm/h", y2Title:"km/h", dualAxis:true})
    });

    chartRH = new Chart(document.getElementById("cRH"), {
      type:"line",
      data:{ labels, datasets:[{ label:"Humitat (%)", data:rh, borderWidth:2, tension:0.35, pointRadius:0 }]},
      options: commonOpts({yTitle:"%"})
    });
  }

  function commonOpts({yTitle, y2Title, dualAxis=false}){
    const scales = {
      x:{ ticks:{color:"rgba(229,231,235,.72)", maxTicksLimit:12}, grid:{color:"rgba(255,255,255,.06)"} },
      y:{ title:{display:!!yTitle,text:yTitle,color:"rgba(229,231,235,.85)",font:{weight:"800"}},
          ticks:{color:"rgba(229,231,235,.72)"}, grid:{color:"rgba(255,255,255,.06)"} }
    };
    if(dualAxis){
      scales.y2 = { position:"right",
        title:{display:!!y2Title,text:y2Title,color:"rgba(229,231,235,.85)",font:{weight:"800"}},
        ticks:{color:"rgba(229,231,235,.72)"},
        grid:{drawOnChartArea:false}
      };
    }
    return {
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{labels:{color:"rgba(229,231,235,.85)",font:{weight:"800"}}}, tooltip:{mode:"index",intersect:false} },
      interaction:{mode:"index",intersect:false},
      scales
    };
  }

  /********** CALLBACKS **********/
  window.cbCurrent = (data) => {
    gotCurrent = true;
    renderKPIs(data);

    const upd = data?.source?.forecast_updated_at || "";
    document.getElementById("metaLine").textContent =
      `Actualitzat: ${new Date().toLocaleString("ca-ES")} · Met.no: ${upd}`;

    updateStatus();
  };

  window.cbForecast = (data) => {
    gotForecast = true;
    renderCharts48(data);
    updateStatus();
  };

  /********** START **********/
  updateStatus();
  loadJSONP(END_CURRENT);
  loadJSONP(END_FORECAST);
</script>
</body>
</html>
