<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prova contador</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }
    .caixa {
      display: inline-block;
      padding: 12px 16px;
      border: 1px solid #b9d7ea;
      border-radius: 12px;
      background: #eef7ff;
      color: #1f4e79;
    }
    #contador {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="caixa">
    <div>🌤️ Visites a la meteo</div>
    <div id="contador">6604</div>
  </div>

  <script>
    const clau = "prova_contador_6604_v1";
    let contador = parseInt(localStorage.getItem(clau) || "6604", 10);
    contador += 1;
    localStorage.setItem(clau, contador);
    document.getElementById("contador").textContent = contador;
  </script>
</body>
</html>
