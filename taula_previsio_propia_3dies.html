<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taula previsió pròpia — 3 dies</title>
  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      margin:0;
      padding:16px;
      background:#f4f7fb;
      color:#1f2937;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    h1{
      margin:0 0 8px 0;
      font-size:26px;
    }

    .meta{
      color:#4b5563;
      margin-bottom:14px;
      font-size:14px;
    }

    .table-wrap{
      background:#fff;
      border-radius:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      overflow:hidden;
    }

    .table-scroll{
      max-height:700px;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:920px;
    }

    th, td{
      padding:10px 12px;
      border-bottom:1px solid #e5e7eb;
      text-align:left;
      font-size:14px;
      white-space:nowrap;
    }

    th{
      background:#f8fafc;
      position:sticky;
      top:0;
      z-index:3;
    }

    tr:hover td{
      background:#f9fbff;
    }

    .day-separator td{
      background:#eaf2ff !important;
      font-weight:700;
      border-top:3px solid #2563eb;
      border-bottom:1px solid #cfe0ff;
      position:sticky;
      top:41px;
      z-index:2;
    }

    .day-separator:hover td{
      background:#eaf2ff !important;
    }

    .wx-cell{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:10px;
      width:fit-content;
      min-width:130px;
    }

    .wx-icon{
      font-size:20px;
      line-height:1;
    }

    .wx-label{
      font-size:13px;
      color:#374151;
      font-weight:600;
    }

    .wx-sun{ background:#fff7cc; }
    .wx-partly{ background:#fff4db; }
    .wx-cloud{ background:#eef2f7; }
    .wx-rain{ background:#e0f2fe; }
    .wx-storm{ background:#ede9fe; }
    .wx-fog{ background:#f3f4f6; }
    .wx-snow{ background:#eff6ff; }
    .wx-night{ background:#e8eefc; }
    .wx-default{ background:#f3f4f6; }

    .event-tag{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .tag-none{
      background:#f3f4f6;
      color:#4b5563;
    }

    .tag-rain{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .tag-wind{
      background:#ffedd5;
      color:#c2410c;
    }

    .tag-mix{
      background:#ede9fe;
      color:#6d28d9;
    }

    .row-rain td{
      background:#f7fbff;
    }

    .row-wind td{
      background:#fffaf5;
    }

    .row-mix td{
      background:#faf7ff;
    }

    .row-rain:hover td{
      background:#eef7ff;
    }

    .row-wind:hover td{
      background:#fff4ea;
    }

    .row-mix:hover td{
      background:#f3ecff;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Taula previsió pròpia — El Masnou NE</h1>
  <div class="meta" id="metaLine">Carregant dades…</div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Dia / hora</th>
            <th>Temp pròpia</th>
            <th>Humitat</th>
            <th>Vent</th>
            <th>Direcció</th>
            <th>Pluja</th>
            <th>Temps</th>
            <th>Avís</th>
          </tr>
        </thead>
        <tbody id="forecastTable">
          <tr><td colspan="8">Carregant previsió…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
const FORECAST_HOURS = 72;

const RAIN_HIGHLIGHT_MM = 0.1;
const RAIN_STRONG_MM = 1.0;
const WIND_HIGHLIGHT_KMH = 20;
const WIND_STRONG_KMH = 30;

let lastForecastData = null;
let modelTempCorrection = 0;
let learningBias = { h6: 0, h12: 0, h24: 0 };
let learningSamples = { h6: 0, h12: 0, h24: 0 };
window.modelObservedTimeUtc = null;

function loadJSONP(url) {
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  s.async = true;
  document.body.appendChild(s);
}

function setText(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

function asNumber(v, fallback = null) {
  if (v === null || v === undefined || v === "") return fallback;
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function parseUtcForecastTime(s) {
  if (!s) return null;
  const d1 = new Date(s);
  if (!isNaN(d1)) return d1;
  const d2 = new Date(s + "Z");
  return isNaN(d2) ? null : d2;
}

function parseObservedUtc(s) {
  if (!s) return null;
  try {
    const p = s.split(",").map(Number);
    return new Date(Date.UTC(p[0], p[1] - 1, p[2], p[3], p[4], p[5]));
  } catch (e) {
    return null;
  }
}

function getBaseTime() {
  let baseTime = parseObservedUtc(window.modelObservedTimeUtc);
  if (!baseTime) baseTime = new Date();
  return baseTime;
}

function getRowTime(row) {
  return row?.t || row?.time || row?.datetime || null;
}

function getRowTemp(row) {
  return asNumber(row?.temp ?? row?.temperature_c ?? row?.temperature ?? null, null);
}

function getRowWind(row) {
  return asNumber(row?.wind_kmh ?? row?.wind_speed_kmh ?? row?.wind ?? null, null);
}

function getRowRain(row) {
  return asNumber(row?.rain_mm ?? row?.precipitation_mm ?? row?.precipitation ?? null, null);
}

function getLocalHourFromRow(row) {
  const dt = parseUtcForecastTime(getRowTime(row));
  if (!dt) return null;
  return Number(dt.toLocaleString("ca-ES", {
    hour: "2-digit",
    hour12: false,
    timeZone: "Europe/Madrid"
  }));
}

function getHorizonBias(h) {
  let bias = 0;
  if (h === 6 && (learningSamples.h6 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h6 ?? 0));
  } else if (h === 12 && (learningSamples.h12 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h12 ?? 0));
  } else if (h === 24 && (learningSamples.h24 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h24 ?? 0));
  }
  return bias;
}

function getCurrentCorrection(h) {
  if (h <= 6) return modelTempCorrection * 0.15;
  if (h <= 12) return modelTempCorrection * 0.08;
  if (h <= 24) return modelTempCorrection * 0.05;
  if (h <= 48) return modelTempCorrection * 0.03;
  if (h <= 72) return modelTempCorrection * 0.02;
  return 0;
}

function getLocalAdjustmentForRow(row) {
  const h = getLocalHourFromRow(row);
  if (h === null || Number.isNaN(h)) return 0;

  const wind = getRowWind(row) ?? 0;
  let a = 0;

  if (h >= 20 && h < 22) a = 0.4;
  else if (h >= 22 || h <= 2) a = 0.8;
  else if (h > 2 && h <= 6) a = 1.0;
  else if (h > 6 && h <= 9) a = 0.5;

  if (wind < 3) a += 0.4;
  else if (wind > 10) a -= 0.2;

  return a;
}

function getMarineCorrection(row) {
  const h = getLocalHourFromRow(row);
  if (h === null || Number.isNaN(h)) return 0;

  const rh = asNumber(row?.rh, 0) ?? 0;
  const wind = getRowWind(row) ?? 0;
  const dir = asNumber(row?.wdir_deg, null);

  let m = 0;

  if (h >= 20 && h < 22) m = 0.4;
  else if (h >= 22 || h <= 2) m = 0.8;
  else if (h > 2 && h <= 6) m = 1.0;
  else if (h > 6 && h <= 9) m = 0.5;

  if (rh >= 85) m += 0.6;
  else if (rh >= 75) m += 0.3;

  if (wind < 5) m += 0.2;
  if (dir !== null && dir >= 45 && dir <= 135) m += 0.2;

  return m;
}

function computeOwnTempForHorizon(row, h) {
  const t = getRowTemp(row);
  if (t === null) return null;

  let biasH = 24;
  if (h <= 6) biasH = 6;
  else if (h <= 12) biasH = 12;

  return t
    + getCurrentCorrection(h)
    + getHorizonBias(biasH)
    + getLocalAdjustmentForRow(row)
    + getMarineCorrection(row);
}

function computeOwnTempForRow(row, index, baseTime) {
  const dt = parseUtcForecastTime(getRowTime(row));
  const t = getRowTemp(row);
  if (!dt || t === null) return null;

  const horizonHours = Math.max(0, (dt - baseTime) / 3600000);
  return computeOwnTempForHorizon(row, horizonHours);
}

function weatherIcon(symbol) {
  const s = String(symbol || "").toLowerCase();
  if (!s) return "•";
  if (s.includes("thunder")) return "⛈️";
  if (s.includes("heavyrain")) return "🌧️";
  if (s.includes("rainshowers")) return "🌦️";
  if (s.includes("rain")) return "🌧️";
  if (s.includes("lightsnow")) return "🌨️";
  if (s.includes("snow")) return "❄️";
  if (s.includes("sleet")) return "🌨️";
  if (s.includes("fog")) return "🌫️";
  if (s.includes("partlycloudy")) return "⛅";
  if (s.includes("cloudy")) return "☁️";
  if (s.includes("fair_night")) return "🌙";
  if (s.includes("fair_day")) return "🌤️";
  if (s.includes("fair")) return "🌤️";
  if (s.includes("clearsky_night")) return "🌙";
  if (s.includes("clearsky_day")) return "☀️";
  if (s.includes("clearsky")) return "☀️";
  return "🌡️";
}

function weatherLabel(symbol) {
  const s = String(symbol || "").toLowerCase();
  if (!s) return "--";
  if (s.includes("thunder")) return "tempesta";
  if (s.includes("heavyrain")) return "pluja forta";
  if (s.includes("rainshowers")) return "ruixats";
  if (s.includes("rain")) return "pluja";
  if (s.includes("lightsnow")) return "neu feble";
  if (s.includes("snow")) return "neu";
  if (s.includes("sleet")) return "aiguaneu";
  if (s.includes("fog")) return "boira";
  if (s.includes("partlycloudy")) return "intervals";
  if (s.includes("cloudy")) return "ennuvolat";
  if (s.includes("fair_night")) return "serè";
  if (s.includes("fair_day")) return "poc núvol";
  if (s.includes("fair")) return "poc núvol";
  if (s.includes("clearsky_night")) return "nit serena";
  if (s.includes("clearsky_day")) return "sol";
  if (s.includes("clearsky")) return "sol";
  return s.replaceAll("_", " ");
}

function weatherClass(symbol) {
  const s = String(symbol || "").toLowerCase();
  if (!s) return "wx-default";
  if (s.includes("thunder")) return "wx-storm";
  if (s.includes("snow") || s.includes("sleet")) return "wx-snow";
  if (s.includes("fog")) return "wx-fog";
  if (s.includes("rain")) return "wx-rain";
  if (s.includes("partlycloudy") || s.includes("fair_day") || s.includes("fair")) return "wx-partly";
  if (s.includes("cloudy")) return "wx-cloud";
  if (s.includes("clearsky_day")) return "wx-sun";
  if (s.includes("clearsky_night") || s.includes("fair_night")) return "wx-night";
  return "wx-default";
}

function classifyRowEvent(row) {
  const rain = getRowRain(row) ?? 0;
  const wind = getRowWind(row) ?? 0;

  if (rain >= RAIN_HIGHLIGHT_MM && wind >= WIND_HIGHLIGHT_KMH) {
    return {
      rowClass: "row-mix",
      tagClass: "tag-mix",
      text: wind >= WIND_STRONG_KMH ? "pluja + vent fort" : "pluja + vent"
    };
  }

  if (rain >= RAIN_HIGHLIGHT_MM) {
    return {
      rowClass: "row-rain",
      tagClass: "tag-rain",
      text: rain >= RAIN_STRONG_MM ? "pluja destacable" : "pluja feble"
    };
  }

  if (wind >= WIND_HIGHLIGHT_KMH) {
    return {
      rowClass: "row-wind",
      tagClass: "tag-wind",
      text: wind >= WIND_STRONG_KMH ? "vent fort" : "vent moderat"
    };
  }

  return {
    rowClass: "",
    tagClass: "tag-none",
    text: "sense avís"
  };
}

function cbCurrent(data) {
  if (!data || !data.ok) return;

  const updatedAt = data?.source?.forecast_updated_at || null;
  let meta = "Dades carregades correctament";
  if (updatedAt) {
    const d = new Date(updatedAt);
    if (!isNaN(d)) {
      meta = "Previsió actualitzada " + d.toLocaleString("ca-ES", {
        timeZone: "Europe/Madrid"
      });
    }
  }
  setText("metaLine", meta);
}

function cbForecast(data) {
  if (!data || !data.ok || !Array.isArray(data.hourly)) return;

  lastForecastData = data;
  const rows = data.hourly.slice(0, FORECAST_HOURS);
  const baseTime = getBaseTime();
  const tbody = document.getElementById("forecastTable");

  if (!tbody) return;

  let html = "";
  let currentDayKey = null;

  rows.forEach((r, i) => {
    const ownT = computeOwnTempForRow(r, i, baseTime);
    const dt = parseUtcForecastTime(getRowTime(r));

    const dayKey = dt ? dt.toLocaleDateString("ca-ES", {
      timeZone: "Europe/Madrid",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    }) : "sense-dia";

    if (dayKey !== currentDayKey) {
      const dayLabel = dt ? dt.toLocaleDateString("ca-ES", {
        timeZone: "Europe/Madrid",
        weekday: "long",
        day: "2-digit",
        month: "2-digit"
      }) : "--";

      html += `
        <tr class="day-separator">
          <td colspan="8" style="text-transform:capitalize;">${dayLabel}</td>
        </tr>
      `;
      currentDayKey = dayKey;
    }

    const labelTime = dt
      ? dt.toLocaleString("ca-ES", {
          weekday: "short",
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Europe/Madrid"
        })
      : "--";

    const symbol = r.symbol ?? "";
    const icon = weatherIcon(symbol);
    const label = weatherLabel(symbol);
    const wxClass = weatherClass(symbol);
    const eventInfo = classifyRowEvent(r);

    html += `
      <tr class="${eventInfo.rowClass}">
        <td>${labelTime}</td>
        <td>${ownT !== null ? ownT.toFixed(1) : "--"} °C</td>
        <td>${r.rh ?? "--"} %</td>
        <td>${r.wind_kmh ?? "--"} km/h</td>
        <td>${r.wdir_deg ?? "--"} °</td>
        <td>${r.rain_mm ?? "--"} mm</td>
        <td>
          <div class="wx-cell ${wxClass}">
            <span class="wx-icon">${icon}</span>
            <span class="wx-label">${label}</span>
          </div>
        </td>
        <td>
          <span class="event-tag ${eventInfo.tagClass}">${eventInfo.text}</span>
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

function cbModel(data) {
  if (!data || !data.ok) return;

  window.modelObservedTimeUtc = data.observed_time_utc || null;

  const devT = data.deviation?.temperature_c ?? "--";
  if (typeof devT === "number") {
    modelTempCorrection = devT;
  }

  const learn = data.learning;
  if (learn) {
    learningBias = learn.bias_temperature_c || learningBias;
    learningSamples = learn.samples || learningSamples;
  }

  if (lastForecastData && Array.isArray(lastForecastData.hourly)) {
    cbForecast(lastForecastData);
  }
}

loadJSONP(API + "?out=current&callback=cbCurrent");
loadJSONP(API + "?out=forecast&callback=cbForecast");
loadJSONP(API + "?out=model&callback=cbModel");
</script>
</body>
</html>
