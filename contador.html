<script>
const namespace = "elmasnou_ne";
const key = "visites_web";

fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
  .then(response => response.json())
  .then(data => {
    document.getElementById("visites").textContent = data.value;
  })
  .catch(error => {
    console.error(error);
    document.getElementById("visites").textContent = "0";
  });
</script>
