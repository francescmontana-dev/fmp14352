<!DOCTYPE html>

<body>

<div>
  🌤️ Visites a la meteo:
  <span id="visites">Carregant...</span>
</div>

<script>
const namespace = "elmasnou_ne";
const key = "visites_web";

<script>
const namespace = "elmasnou_ne";
const key = "visites_web";

fetch(`https://counterapi.dev/api/${namespace}/${key}/up`)
  .then(response => response.json())
  .then(data => {
    document.getElementById("visites").textContent = data.count;
  })
  .catch(error => {
    console.error(error);
    document.getElementById("visites").textContent = "Error";
  });
</script>
