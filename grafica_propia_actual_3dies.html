<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gràfica previsió pròpia — 3 dies</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f7fb;
}

.wrap{
  max-width:900px;
  margin:auto;
}

.chart-wrap{
  background:#fff;
  border-radius:14px;
  padding:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  height:380px;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
const HOURS = 72;

let chart = null;
let lastForecastData = null;
let modelTempCorrection = 0;
let learningBias = { h6:0, h12:0, h24:0 };
let learningSamples = { h6:0, h12:0, h24:0 };
window.modelObservedTimeUtc = null;

function loadJSONP(url){
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  document.body.appendChild(s);
}

function asNumber(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function parseUtc(s){
  if(!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function getBaseTime(){
  return new Date();
}

function getRowTemp(r){ return asNumber(r.temp); }
function getRowWind(r){ return asNumber(r.wind_kmh); }
function getRowRain(r){ return asNumber(r.rain_mm); }

function getHour(row){
  const d = parseUtc(row.t);
  if(!d) return null;
  return Number(d.toLocaleString("ca-ES",{hour:"2-digit",hour12:false,timeZone:"Europe/Madrid"}));
}

/* ===== CORRECCIÓ SUAU ===== */

function getLocalAdjustment(row){
  const h = getHour(row);
  if(h===null) return 0;

  const wind = getRowWind(row) ?? 0;

  let a = 0;

  if(h>=20 && h<22) a=0.4;
  else if(h>=22 || h<=2) a=0.8;
  else if(h>2 && h<=6) a=1.0;
  else if(h>6 && h<=9) a=0.5;

  if(wind<3) a+=0.4;
  else if(wind>10) a-=0.2;

  return a;
}

function getMarine(row){
  const h = getHour(row);
  if(h===null) return 0;

  const rh = asNumber(row.rh) ?? 0;
  const wind = getRowWind(row) ?? 0;
  const dir = asNumber(row.wdir_deg);

  let m = 0;

  if(h>=20 && h<22) m=0.4;
  else if(h>=22 || h<=2) m=0.8;
  else if(h>2 && h<=6) m=1.0;
  else if(h>6 && h<=9) m=0.5;

  if(rh>=85) m+=0.6;
  else if(rh>=75) m+=0.3;

  if(wind<5) m+=0.2;
  if(dir!==null && dir>=45 && dir<=135) m+=0.2;

  return m;
}

function getCurrentCorr(h){
  if(h<=6) return modelTempCorrection*0.15;
  if(h<=12) return modelTempCorrection*0.08;
  if(h<=24) return modelTempCorrection*0.05;
  if(h<=48) return modelTempCorrection*0.03;
  if(h<=72) return modelTempCorrection*0.02;
  return 0;
}

function getBias(h){
  if(h<=6 && learningSamples.h6>=8) return learningBias.h6;
  if(h<=12 && learningSamples.h12>=8) return learningBias.h12;
  if(h<=24 && learningSamples.h24>=8) return learningBias.h24;
  return 0;
}

function ownTemp(row, base){
  const t = getRowTemp(row);
  if(t===null) return null;

  const dt = parseUtc(row.t);
  if(!dt) return null;

  const h = Math.max(0,(dt-base)/3600000);

  return t
    + getCurrentCorr(h)
    + getBias(h)
    + getLocalAdjustment(row)
    + getMarine(row);
}

/* ===== DADES ===== */

function cbForecast(data){
  if(!data || !data.ok) return;

  lastForecastData = data;

  const rows = data.hourly.slice(0,HOURS);
  const base = getBaseTime();

  const labels = rows.map(r=>{
    const d = parseUtc(r.t);
    return d ? d.toLocaleString("ca-ES",{day:"2-digit",hour:"2-digit",timeZone:"Europe/Madrid"}) : "--";
  });

  const model = rows.map(r=>getRowTemp(r));
  const own = rows.map(r=>ownTemp(r,base));
  const rain = rows.map(r=>getRowRain(r));

  const ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[
        {
          label:"Model",
          data:model,
          borderColor:"rgba(100,100,255,0.5)",
          borderWidth:1.5,
          tension:0.25,
          pointRadius:0
        },
        {
          label:"Pròpia",
          data:own,
          borderColor:"rgba(255,120,0,1)",
          borderWidth:3,
          borderDash:[6,4],
          tension:0.25,
          pointRadius:0
        },
        {
          label:"Pluja",
          data:rain,
          type:"bar",
          yAxisID:"y1"
        }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:"index",intersect:false},
      scales:{
        y:{position:"left"},
        y1:{position:"right",grid:{drawOnChartArea:false}}
      }
    }
  });
}

function cbModel(data){
  if(!data || !data.ok) return;

  window.modelObservedTimeUtc = data.observed_time_utc || null;

  const dev = data.deviation?.temperature_c;
  if(typeof dev==="number") modelTempCorrection = dev;

  if(data.learning){
    learningBias = data.learning.bias_temperature_c || learningBias;
    learningSamples = data.learning.samples || learningSamples;
  }
}

/* ===== LOAD ===== */

loadJSONP(API+"?out=forecast&callback=cbForecast");
loadJSONP(API+"?out=model&callback=cbModel");

</script>
</body>
</html>
