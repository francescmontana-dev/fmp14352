<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tauler Meteo — El Masnou</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0b1020;
--card:#111827;
--muted:#94a3b8;
--text:#e5e7eb;
--grid:rgba(255,255,255,.06);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,Arial;
background:linear-gradient(180deg,#0b1020,#0f172a,#0b1020);
color:var(--text);
padding:12px;
}

.wrap{max-width:980px;margin:auto}

.card{
background:rgba(17,24,39,.92);
border-radius:18px;
padding:12px;
margin-bottom:10px;
}

.top{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.brand{
flex:1 1 260px;
}

.brand h1{
margin:0;
font-size:22px;
font-weight:900;
}

.meta{
font-size:12px;
color:var(--muted);
}

.pillRow{
margin-top:6px;
}

.pill{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:rgba(96,165,250,.18);
border:1px solid rgba(96,165,250,.35);
font-weight:900;
font-size:12px;
color:var(--text);
text-decoration:none;
}

.kpis{
flex:2 1 520px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.kpi{
background:rgba(255,255,255,.04);
border-radius:14px;
padding:10px;
}

.k{font-size:11px;color:var(--muted)}
.v{font-size:18px;font-weight:900}
.s{font-size:11px;color:var(--muted)}

.chartTitle{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:13px;
font-weight:900;
}

.canvasWrap{
height:220px;
}

@media(max-width:720px){
.kpis{grid-template-columns:repeat(2,1fr)}
.canvasWrap{height:190px}
}

</style>
</head>

<body>

<div class="wrap">

<div class="card top">

<div class="brand">
<h1>🌦️ El Masnou - NE</h1>

<div id="currentBig">—</div>

<div class="meta" id="metaLine">
Carregant dades…
</div>

<div class="pillRow">
<a class="pill" href="./taula.html">📋 Taula 72 h</a>
</div>

</div>

<div class="kpis">

<div class="kpi">
<div class="k">Temperatura</div>
<div class="v" id="kTemp">—</div>
<div class="s" id="kDeltaT">Δ —</div>
</div>

<div class="kpi">
<div class="k">Humitat</div>
<div class="v" id="kRH">—</div>
<div class="s" id="kDeltaRH">Δ —</div>
</div>

<div class="kpi">
<div class="k">Vent</div>
<div class="v" id="kWind">—</div>
<div class="s" id="kGust">Ratxa —</div>
</div>

<div class="kpi">
<div class="k">Pluja</div>
<div class="v" id="kRain">—</div>
<div class="s" id="kRainSoon">3h —</div>
</div>

</div>

</div>

<div class="card">
<div class="chartTitle">
Temperatura · 72 h
</div>
<div class="canvasWrap">
<canvas id="cTemp72"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Vent · 72 h
</div>
<div class="canvasWrap">
<canvas id="cWind72"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Pluja · 72 h
</div>
<div class="canvasWrap">
<canvas id="cRain72"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Humitat · 72 h
</div>
<div class="canvasWrap">
<canvas id="cRH72"></canvas>
</div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec"

function loadJSONP(url){
const s=document.createElement("script")
s.src=url+"&_="+Date.now()
document.body.appendChild(s)
}

function fmt1(x){
return (typeof x==="number")?(Math.round(x*10)/10).toFixed(1):"—"
}

function fmt0(x){
return (typeof x==="number")?Math.round(x):"—"
}

function ddhh(t){
return new Date(t).toLocaleString("ca-ES",{weekday:"short",hour:"2-digit"})
}

let chartTemp72
let chartWind72
let chartRain72
let chartRH72

function commonOpts(unit){
return{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{grid:{color:"rgba(255,255,255,.06)"}},
y:{title:{display:true,text:unit}}
}
}
}

window.cbCurrent=function(data){

const obs=data.obs||{}
const prev=data.prev_now||{}

const dT=(obs.temp&&prev.temp)?obs.temp-prev.temp:null
const dRH=(obs.rh&&prev.rh)?obs.rh-prev.rh:null

kTemp.textContent=fmt1(obs.temp)+"°C"
kRH.textContent=fmt0(obs.rh)+"%"
kWind.textContent=fmt0(obs.wind_kmh)+" km/h"
kGust.textContent="Ratxa "+fmt0(obs.gust_kmh)+" km/h"
kRain.textContent=fmt1(obs.rain_day_mm)+" mm"
kRainSoon.textContent="3h "+fmt1(data.derived?.rain_3h_mm)+" mm"

kDeltaT.textContent="Δ "+(dT?fmt1(dT):"—")
kDeltaRH.textContent="Δ "+(dRH?fmt0(dRH):"—")

metaLine.textContent="Actualitzat: "+new Date().toLocaleString("ca-ES")
}

window.cbForecast=function(data){

const h=data.hourly.slice(0,72)

const labels=h.map(x=>ddhh(x.t))

const temp=h.map(x=>x.temp)
const wind=h.map(x=>x.wind_kmh)
const rain=h.map(x=>x.rain_mm)
const rh=h.map(x=>x.rh)

if(chartTemp72)chartTemp72.destroy()
if(chartWind72)chartWind72.destroy()
if(chartRain72)chartRain72.destroy()
if(chartRH72)chartRH72.destroy()

chartTemp72=new Chart(cTemp72,{
type:"line",
data:{labels:labels,datasets:[{data:temp,tension:.35}]},
options:commonOpts("°C")
})

chartWind72=new Chart(cWind72,{
type:"line",
data:{labels:labels,datasets:[{data:wind,tension:.35}]},
options:commonOpts("km/h")
})

chartRain72=new Chart(cRain72,{
type:"bar",
data:{labels:labels,datasets:[{data:rain}]},
options:commonOpts("mm")
})

chartRH72=new Chart(cRH72,{
type:"line",
data:{labels:labels,datasets:[{data:rh,tension:.35}]},
options:commonOpts("%")
})

}

loadJSONP(API+"?out=current&callback=cbCurrent")
loadJSONP(API+"?out=forecast&callback=cbForecast")

</script>

</body>
</html>
