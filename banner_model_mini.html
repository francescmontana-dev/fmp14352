<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banner Mini El Masnou NE</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1d4ed8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --ok:#15803d;
      --mid:#b45309;
      --bad:#b91c1c;
      --accent:#2563eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:8px;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
    }
    .card{
      max-width:520px;
      margin:0 auto;
      background:var(--card);
      border-radius:18px;
      box-shadow:0 14px 30px rgba(2,6,23,.28);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
    }
    .top{
      padding:14px 16px 10px 16px;
      background:linear-gradient(180deg,#f8fbff 0%, #eef5ff 100%);
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .title{
      font-size:20px;
      font-weight:700;
      line-height:1.05;
      margin:0;
    }
    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }
    .badge{
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
      border:1px solid transparent;
    }
    .badge.ok{background:#ecfdf5;color:var(--ok);border-color:#bbf7d0}
    .badge.mid{background:#fff7ed;color:var(--mid);border-color:#fed7aa}
    .badge.bad{background:#fef2f2;color:var(--bad);border-color:#fecaca}
    .main{
      padding:14px 16px 10px 16px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-bottom:10px;
    }
    .metric{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 10px;
      text-align:center;
    }
    .metric .label{
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin-bottom:5px;
    }
    .metric .value{
      font-size:26px;
      font-weight:700;
      line-height:1;
    }
    .metric .unit{
      font-size:14px;
      color:#475569;
      font-weight:700;
      margin-left:2px;
    }
    .summary{
      font-size:14px;
      color:#334155;
      line-height:1.4;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
    }
    .minirow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .mini{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
    }
    .mini .label{
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin-bottom:4px;
    }
    .mini .value{
      font-size:18px;
      font-weight:700;
    }
    .footer{
      padding:12px 16px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      border-top:1px solid var(--line);
      background:#fcfdff;
    }
    .updated{
      font-size:12px;
      color:var(--muted);
    }
    .button{
      display:block;
      width:100%;
      text-align:center;
      padding:11px 14px;
      border-radius:12px;
      background:var(--accent);
      color:white;
      text-decoration:none;
      font-size:14px;
      font-weight:700;
    }
    @media (max-width:430px){
      .grid{grid-template-columns:1fr}
      .minirow{grid-template-columns:1fr}
      .title{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <div class="title">El Masnou NE</div>
        <div class="sub">Model local ajustat a dades reals</div>
      </div>
      <div id="qualityBadge" class="badge mid">Carregant…</div>
    </div>

    <div class="main">
      <div class="grid">
        <div class="metric">
          <div class="label">Ara</div>
          <div><span id="realTemp" class="value">--</span><span class="unit">°C</span></div>
        </div>
        <div class="metric">
          <div class="label">Previst</div>
          <div><span id="forecastTemp" class="value">--</span><span class="unit">°C</span></div>
        </div>
        <div class="metric">
          <div class="label">Desviació</div>
          <div><span id="deviationTemp" class="value">--</span><span class="unit">°C</span></div>
        </div>
      </div>

      <div id="summaryText" class="summary">Carregant informació del model…</div>

      <div class="minirow">
        <div class="mini">
          <div class="label">Vent</div>
          <div id="wind" class="value">-- km/h</div>
        </div>
        <div class="mini">
          <div class="label">Humitat</div>
          <div id="humidity" class="value">-- %</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div id="updatedAt" class="updated">Actualitzat: --</div>
      <a class="button" href="dashboard35.html">Veure previsió completa</a>
    </div>
  </div>

  <script>
    const DATA_URL = "model/banner.json?t=" + Date.now();

    function setText(id, txt) {
      const el = document.getElementById(id);
      if (el) el.textContent = txt;
    }

    function formatGenerated(s) {
      if (!s) return "--";
      const d = new Date(s);
      if (isNaN(d)) return s;
      return d.toLocaleString("ca-ES", {
        timeZone: "Europe/Madrid",
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function qualityInfo(q, absDev) {
      const qq = String(q || "").toLowerCase();
      if (qq === "baja" || (typeof absDev === "number" && absDev <= 1)) {
        return { text: "Precisió alta", cls: "ok" };
      }
      if (qq === "media" || (typeof absDev === "number" && absDev <= 2)) {
        return { text: "Precisió mitjana", cls: "mid" };
      }
      return { text: "Precisió baixa", cls: "bad" };
    }

    fetch(DATA_URL)
      .then(r => r.json())
      .then(j => {
        const realT = Number(j?.real?.temperature_c);
        const fcT = Number(j?.forecast?.temperature_c);
        const devT = Number(j?.deviation?.temperature_c);
        const hum = Number(j?.real?.humidity_pct);
        const windReal = Number(j?.real?.wind_speed_kmh);
        const q = qualityInfo(j?.quality?.temperature, Number.isFinite(devT) ? Math.abs(devT) : null);

        setText("realTemp", Number.isFinite(realT) ? realT.toFixed(1) : "--");
        setText("forecastTemp", Number.isFinite(fcT) ? fcT.toFixed(1) : "--");
        setText("deviationTemp", Number.isFinite(devT) ? ((devT > 0 ? "+" : "") + devT.toFixed(1)) : "--");
        setText("humidity", Number.isFinite(hum) ? `${hum} %` : "-- %");
        setText("wind", Number.isFinite(windReal) ? `${windReal.toFixed(1)} km/h` : "-- km/h");
        setText("updatedAt", `Actualitzat: ${formatGenerated(j?.generated_at_utc)}`);

        const badge = document.getElementById("qualityBadge");
        badge.textContent = q.text;
        badge.className = `badge ${q.cls}`;

        if (Number.isFinite(realT) && Number.isFinite(fcT) && Number.isFinite(devT)) {
          const sign = devT > 0 ? "+" : "";
          setText("summaryText", `Ara: ${realT.toFixed(1)} °C · Previst: ${fcT.toFixed(1)} °C · Desviació: ${sign}${devT.toFixed(1)} °C.`);
        } else {
          setText("summaryText", "No s'han pogut carregar totes les dades del model.");
        }
      })
      .catch(() => {
        setText("summaryText", "Error carregant les dades del model.");
        const badge = document.getElementById("qualityBadge");
        badge.textContent = "Sense dades";
        badge.className = "badge bad";
      });

    setTimeout(() => location.reload(), 300000);
  </script>
</body>
</html>
