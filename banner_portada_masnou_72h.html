<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El Masnou NE</title>
<style>
body{
  margin:0;
  padding:10px;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f7fb;
}
.wrap{
  max-width:560px;
  margin:auto;
}
.banner{
  background:linear-gradient(135deg,#0f172a,#1d4ed8);
  color:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.title{
  font-size:20px;
  font-weight:700;
}
.meta{
  font-size:11px;
  opacity:.85;
  margin:4px 0 10px 0;
}
.temp{
  font-size:40px;
  font-weight:800;
  margin:4px 0 8px 0;
  line-height:1;
}
.line{
  font-size:13px;
  margin:3px 0;
}
.days{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.day{
  background:rgba(255,255,255,.12);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  line-height:1.35;
  text-align:center;
}
.day .d{
  font-weight:700;
  margin-bottom:4px;
}
.day .v{
  display:block;
}
.buttons{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.btn{
  display:block;
  flex:1;
  text-align:center;
  background:#fff;
  color:#0f172a;
  padding:11px;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
}
.btn-secondary{
  background:rgba(255,255,255,.16);
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
}
@media (max-width:520px){
  .buttons{
    flex-direction:column;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">
    <div class="title">🌤️ El Masnou NE</div>
    <div class="meta" id="meta">Carregant…</div>

    <div class="temp" id="temp">-- °C</div>

    <div class="line" id="hum">Humitat --</div>
    <div class="line" id="wind">Vent --</div>
    <div class="line" id="rain">Pluja --</div>

    <div class="days" id="days">
      <div class="day">--</div>
      <div class="day">--</div>
      <div class="day">--</div>
    </div>

    <div class="buttons">
      <a class="btn" href="https://francescmontana-dev.github.io/fmp14352/grafica_propia_actual_3dies.html" target="_blank" rel="noopener noreferrer">
        Veure gràfica
      </a>

      <a class="btn btn-secondary" href="https://francescmontana-dev.github.io/fmp14352/taula_previsio_propia_3dies.html" target="_blank" rel="noopener noreferrer">
        Veure taula
      </a>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
const FORECAST_HOURS = 72;

let lastForecastData = null;
let modelTempCorrection = 0;
let learningBias = { h6: 0, h12: 0, h24: 0 };
let learningSamples = { h6: 0, h12: 0, h24: 0 };
window.modelObservedTimeUtc = null;

function loadJSONP(url) {
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  s.async = true;
  document.body.appendChild(s);
}

function setText(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

function asNumber(v, fallback = null) {
  if (v === null || v === undefined || v === "") return fallback;
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function parseUtcForecastTime(s) {
  if (!s) return null;
  const d1 = new Date(s);
  if (!isNaN(d1)) return d1;
  const d2 = new Date(s + "Z");
  return isNaN(d2) ? null : d2;
}

function parseObservedUtc(s) {
  if (!s) return null;
  try {
    const p = s.split(",").map(Number);
    return new Date(Date.UTC(p[0], p[1] - 1, p[2], p[3], p[4], p[5]));
  } catch (e) {
    return null;
  }
}

function getBaseTime() {
  let baseTime = parseObservedUtc(window.modelObservedTimeUtc);
  if (!baseTime) baseTime = new Date();
  return baseTime;
}

function getRowTime(row) {
  return row?.t || row?.time || row?.datetime || null;
}

function getRowTemp(row) {
  return asNumber(row?.temp ?? row?.temperature_c ?? row?.temperature ?? null, null);
}

function getRowWind(row) {
  return asNumber(row?.wind_kmh ?? row?.wind_speed_kmh ?? row?.wind ?? null, null);
}

function getRowRain(row) {
  return asNumber(row?.rain_mm ?? row?.precipitation_mm ?? row?.precipitation ?? null, null);
}

function getHorizonBias(h) {
  let bias = 0;
  if (h === 6 && (learningSamples.h6 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h6 ?? 0));
  } else if (h === 12 && (learningSamples.h12 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h12 ?? 0));
  } else if (h === 24 && (learningSamples.h24 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h24 ?? 0));
  }
  return bias;
}

function getCurrentCorrection(h) {
  if (h <= 6) return modelTempCorrection * 0.15;
  if (h <= 12) return modelTempCorrection * 0.08;
  if (h <= 24) return modelTempCorrection * 0.05;
  if (h <= 48) return modelTempCorrection * 0.03;
  if (h <= 72) return modelTempCorrection * 0.02;
  return 0;
}

function getLocalHourFromRow(row) {
  const dt = parseUtcForecastTime(getRowTime(row));
  if (!dt) return null;
  return Number(dt.toLocaleString("ca-ES", {
    hour: "2-digit",
    hour12: false,
    timeZone: "Europe/Madrid"
  }));
}

function getLocalAdjustmentForRow(row) {
  const h = getLocalHourFromRow(row);
  if (h === null || Number.isNaN(h)) return 0;

  const wind = getRowWind(row) ?? 0;
  let a = 0;

  if (h >= 20 && h < 22) a = 0.4;
  else if (h >= 22 || h <= 2) a = 0.8;
  else if (h > 2 && h <= 6) a = 1.0;
  else if (h > 6 && h <= 9) a = 0.5;

  if (wind < 3) a += 0.4;
  else if (wind > 10) a -= 0.2;

  return a;
}

function getMarineCorrection(row) {
  const h = getLocalHourFromRow(row);
  if (h === null || Number.isNaN(h)) return 0;

  const rh = asNumber(row?.rh, 0) ?? 0;
  const wind = getRowWind(row) ?? 0;
  const dir = asNumber(row?.wdir_deg, null);

  let m = 0;

  if (h >= 20 && h < 22) m = 0.4;
  else if (h >= 22 || h <= 2) m = 0.8;
  else if (h > 2 && h <= 6) m = 1.0;
  else if (h > 6 && h <= 9) m = 0.5;

  if (rh >= 85) m += 0.6;
  else if (rh >= 75) m += 0.3;

  if (wind < 5) m += 0.2;
  if (dir !== null && dir >= 45 && dir <= 135) m += 0.2;

  return m;
}

function computeOwnTempForHorizon(row, h) {
  const t = getRowTemp(row);
  if (t === null) return null;

  let biasH = 24;
  if (h <= 6) biasH = 6;
  else if (h <= 12) biasH = 12;

  return t
    + getCurrentCorrection(h)
    + getHorizonBias(biasH)
    + getLocalAdjustmentForRow(row)
    + getMarineCorrection(row);
}

function computeOwnTempForRow(row, index, baseTime) {
  const dt = parseUtcForecastTime(getRowTime(row));
  const t = getRowTemp(row);
  if (!dt || t === null) return null;

  const horizonHours = Math.max(0, (dt - baseTime) / 3600000);
  return computeOwnTempForHorizon(row, horizonHours);
}

function cbCurrent(data) {
  if (!data || !data.ok) return;

  const obs = data.obs || {};
  const updatedAt = data?.source?.forecast_updated_at || null;

  setText("temp", `${obs.temp ?? "--"} °C`);
  setText("hum", `Humitat ${obs.rh ?? "--"} %`);
  setText("wind", `Vent ${obs.wind_kmh ?? "--"} km/h`);
  setText("rain", `Pluja ${obs.rain_day_mm ?? "--"} mm`);

  if (updatedAt) {
    const d = new Date(updatedAt);
    if (!isNaN(d)) {
      setText("meta", "Actualitzat " + d.toLocaleString("ca-ES", { timeZone: "Europe/Madrid" }));
    }
  } else {
    setText("meta", "Actualitzat");
  }
}

function cbForecast(data) {
  if (!data || !data.ok || !Array.isArray(data.hourly)) return;
  lastForecastData = data;
  buildBlocks();
}

function cbModel(data) {
  if (!data || !data.ok) return;

  window.modelObservedTimeUtc = data.observed_time_utc || null;

  const devT = data.deviation?.temperature_c ?? "--";
  if (typeof devT === "number") {
    modelTempCorrection = devT;
  }

  const learn = data.learning;
  if (learn) {
    learningBias = learn.bias_temperature_c || learningBias;
    learningSamples = learn.samples || learningSamples;
  }

  buildBlocks();
}

function buildBlocks() {
  if (!lastForecastData || !Array.isArray(lastForecastData.hourly)) return;

  const rows = lastForecastData.hourly.slice(0, FORECAST_HOURS);
  const baseTime = getBaseTime();

  const blocks = [
    { label: "Properes 24 h", from: 0, to: 24 },
    { label: "24 a 48 h", from: 24, to: 48 },
    { label: "48 a 72 h", from: 48, to: 72 }
  ];

  const html = blocks.map(block => {
    const part = rows.filter((row, i) => {
      const dt = parseUtcForecastTime(getRowTime(row));
      if (!dt) return false;
      const h = Math.max(0, (dt - baseTime) / 3600000);
      return h >= block.from && h < block.to;
    });

    const ownTemps = part.map((row, i) => {
      const globalIndex = rows.indexOf(row);
      return computeOwnTempForRow(row, globalIndex, baseTime);
    }).filter(v => v !== null);

    const rains = part.map(x => getRowRain(x) || 0);
    const winds = part.map(x => getRowWind(x)).filter(v => v !== null);

    const tMinOwn = ownTemps.length ? Math.min(...ownTemps).toFixed(1) : "--";
    const tMaxOwn = ownTemps.length ? Math.max(...ownTemps).toFixed(1) : "--";
    const rainTotal = rains.reduce((a, b) => a + b, 0).toFixed(1);
    const windMax = winds.length ? Math.max(...winds).toFixed(1) : "--";

    return `
      <div class="day">
        <div class="d">${block.label}</div>
        <span class="v">${tMaxOwn}° / ${tMinOwn}°</span>
        <span class="v">${rainTotal} mm</span>
        <span class="v">${windMax} km/h</span>
      </div>
    `;
  }).join("");

  document.getElementById("days").innerHTML = html;
}

loadJSONP(API + "?out=current&callback=cbCurrent");
loadJSONP(API + "?out=forecast&callback=cbForecast");
loadJSONP(API + "?out=model&callback=cbModel");
</script>
</body>
</html>
