<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualitat de l'aire - El Masnou</title>

<style>
  body {
    margin: 0;
    padding: 12px;
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: #222;
  }

  .widget {
    width: 340px;
    margin: 0 auto;
    border: 1px solid #cfcfcf;
    border-radius: 12px;
    background: #fff;
    box-sizing: border-box;
    overflow: hidden;
  }

  .header {
    padding: 10px 12px;
    border-bottom: 1px solid #e5e5e5;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
  }

  .main {
    padding: 14px 12px 8px 12px;
    text-align: center;
  }

  .aqi-label {
    font-size: 13px;
    color: #555;
    margin-bottom: 4px;
  }

  .aqi-value {
    font-size: 56px;
    font-weight: bold;
    line-height: 1;
    margin: 4px 0;
  }

  .aqi-status {
    font-size: 16px;
    font-weight: bold;
    margin-top: 8px;
  }

  .aqi-band {
    height: 8px;
    margin: 12px auto 8px auto;
    border-radius: 999px;
    width: 85%;
    background: linear-gradient(to right, #2e7d32 0%, #8bc34a 25%, #fbc02d 50%, #f57c00 75%, #c62828 100%);
  }

  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 12px 12px 12px;
  }

  .card {
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    padding: 10px 8px;
    background: #fafafa;
    text-align: center;
  }

  .card-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 22px;
    font-weight: bold;
  }

  .card-unit {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  .footer {
    border-top: 1px solid #e5e5e5;
    padding: 8px 12px 10px 12px;
    font-size: 11px;
    color: #666;
    text-align: center;
  }

  .good { color: #2e7d32; }
  .fair { color: #8bc34a; }
  .moderate { color: #f9a825; }
  .poor { color: #ef6c00; }
  .very-poor { color: #c62828; }

  .loading,
  .error {
    padding: 18px 12px;
    text-align: center;
    font-size: 14px;
  }

  .error {
    color: #b00020;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">Qualitat de l’aire · El Masnou</div>

  <div id="content">
    <div class="loading">Carregant dades...</div>
  </div>
</div>

<script>
  const lat = 41.479;
  const lon = 2.319;

  const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm2_5,pm10,nitrogen_dioxide,ozone`;

  function aqiInfo(aqi) {
    if (aqi <= 20) {
      return { text: "Molt bona", className: "good" };
    } else if (aqi <= 40) {
      return { text: "Bona", className: "fair" };
    } else if (aqi <= 60) {
      return { text: "Moderada", className: "moderate" };
    } else if (aqi <= 80) {
      return { text: "Dolenta", className: "poor" };
    } else {
      return { text: "Molt dolenta", className: "very-poor" };
    }
  }

  function formatValue(v, digits = 1) {
    if (v === null || v === undefined || Number.isNaN(v)) return "--";
    return Number(v).toFixed(digits);
  }

  function formatHour(isoString) {
    if (!isoString) return "--:--";
    const d = new Date(isoString);
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }

  function renderError() {
    document.getElementById("content").innerHTML = `
      <div class="error">No s'han pogut carregar les dades.</div>
      <div class="footer">Comprova la connexió o torna-ho a provar més tard.</div>
    `;
  }

  function renderData(data) {
    const current = data.current || {};

    const aqi = current.european_aqi;
    const pm25 = current.pm2_5;
    const pm10 = current.pm10;
    const no2 = current.nitrogen_dioxide;
    const o3 = current.ozone;
    const time = current.time;

    const info = aqiInfo(aqi);

    document.getElementById("content").innerHTML = `
      <div class="main">
        <div class="aqi-label">Índex europeu AQI</div>
        <div class="aqi-value ${info.className}">${formatValue(aqi, 0)}</div>
        <div class="aqi-status ${info.className}">${info.text}</div>
        <div class="aqi-band"></div>
      </div>

      <div class="details">
        <div class="card">
          <div class="card-title">PM2.5</div>
          <div class="card-value">${formatValue(pm25, 1)}</div>
          <div class="card-unit">µg/m³</div>
        </div>

        <div class="card">
          <div class="card-title">PM10</div>
          <div class="card-value">${formatValue(pm10, 1)}</div>
          <div class="card-unit">µg/m³</div>
        </div>

        <div class="card">
          <div class="card-title">NO₂</div>
          <div class="card-value">${formatValue(no2, 1)}</div>
          <div class="card-unit">µg/m³</div>
        </div>

        <div class="card">
          <div class="card-title">O₃</div>
          <div class="card-value">${formatValue(o3, 1)}</div>
          <div class="card-unit">µg/m³</div>
        </div>
      </div>

      <div class="footer">
        Dades actualitzades a les ${formatHour(time)} · Font: Open-Meteo
      </div>
    `;
  }

  async function loadAirQuality() {
    try {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error("Resposta no vàlida");
      const data = await response.json();
      renderData(data);
    } catch (error) {
      console.error(error);
      renderError();
    }
  }

  loadAirQuality();

  // Auto-refresc cada 10 minuts
  setInterval(loadAirQuality, 10 * 60 * 1000);
</script>

</body>
</html>
