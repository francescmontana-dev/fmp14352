<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: transparent;
}

.wrap{
  padding: 4px;
}

.bar{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:42px;
  padding:8px 10px;
  border-radius:12px;
  background:#f8fafc;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:0 3px 10px rgba(0,0,0,.06);
  overflow:hidden;
}

.accent{
  width:4px;
  align-self:stretch;
  border-radius:999px;
  background:#2563eb;
  flex:0 0 4px;
}

.main{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.mag{
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.3px;
  white-space:nowrap;
}

.info{
  min-width:0;
  display:flex;
  align-items:center;
  gap:6px;
  flex:1;
  overflow:hidden;
  font-size:13px;
  color:#111827;
}

.region{
  font-weight:600;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.sep{
  color:#9ca3af;
  flex:0 0 auto;
}

.label{
  color:#6b7280;
  white-space:nowrap;
  flex:0 0 auto;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#dc2626;
  flex:0 0 8px;
  display:none;
}

.dot.live{
  display:block;
  animation:blink 1.4s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.25}
  100%{opacity:1}
}

/* colors per magnitud */
.molt-debil .accent{ background:#2563eb; }
.molt-debil .mag{ color:#2563eb; }

.debil .accent{ background:#0891b2; }
.debil .mag{ color:#0891b2; }

.lleu .accent{ background:#d97706; }
.lleu .mag{ color:#d97706; }

.moderat .accent{ background:#dc2626; }
.moderat .mag{ color:#dc2626; }

.error .accent{ background:#6b7280; }
.error .mag{ color:#6b7280; }

@media (max-width: 480px){
  .bar{
    padding:7px 9px;
    min-height:38px;
    gap:8px;
  }
  .mag{
    font-size:17px;
  }
  .info{
    font-size:12px;
    gap:5px;
  }
}
</style>
</head>

<body>
<div class="wrap">
  <div id="bar" class="bar">
    <div class="accent"></div>
    <div class="main">
      <div id="mag" class="mag">--</div>
      <div class="info">
        <span id="region" class="region">Carregant…</span>
        <span class="sep">·</span>
        <span id="label" class="label"></span>
      </div>
    </div>
    <div id="dot" class="dot"></div>
  </div>
</div>

<script>
(async function () {
  const barEl = document.getElementById("bar");
  const magEl = document.getElementById("mag");
  const regionEl = document.getElementById("region");
  const labelEl = document.getElementById("label");
  const dotEl = document.getElementById("dot");

  const minLat = 40.5;
  const maxLat = 42.9;
  const minLon = 0.1;
  const maxLon = 3.5;

  const end = new Date();
  const start = new Date();
  start.setMonth(start.getMonth() - 1);

  function pad(n){
    return String(n).padStart(2, "0");
  }

  function toISO(d){
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }

  function tradueixZona(z){
    if (!z) return "Catalunya";
    const t = z.toUpperCase().trim();

    if (t.includes("EASTERN PYRENEES")) return "Pirineus orientals";
    if (t.includes("WESTERN PYRENEES")) return "Pirineus occidentals";
    if (t.includes("PYRENEES")) return "Pirineus";
    if (t.includes("NEAR COAST OF CATALONIA")) return "Costa de Catalunya";
    if (t.includes("BARCELONA")) return "Barcelona";
    if (t.includes("GIRONA")) return "Girona";
    if (t.includes("TARRAGONA")) return "Tarragona";
    if (t.includes("LLEIDA")) return "Lleida";
    if (t.includes("CATALONIA") || t.includes("CATALUNYA")) return "Catalunya";
    if (t.includes("MEDITERRANEAN")) return "Mediterrani";
    if (t.includes("BALEARIC")) return "Mar Balear";
    if (t.includes("ANDORRA")) return "Andorra";
    if (t.includes("FRANCE")) return "França";
    if (t.includes("SPAIN")) return "Espanya";

    return z.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  }

  function textMag(m){
    if (m < 2) return "molt dèbil";
    if (m < 3) return "dèbil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  function classMag(m){
    if (m < 2) return "molt-debil";
    if (m < 3) return "debil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  try {
    const url =
      "https://www.seismicportal.eu/fdsnws/event/1/query?format=json" +
      "&starttime=" + encodeURIComponent(toISO(start)) +
      "&endtime=" + encodeURIComponent(toISO(end)) +
      "&minlat=" + encodeURIComponent(minLat) +
      "&maxlat=" + encodeURIComponent(maxLat) +
      "&minlon=" + encodeURIComponent(minLon) +
      "&maxlon=" + encodeURIComponent(maxLon);

    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();
    const features = Array.isArray(data.features) ? data.features : [];

    if (!features.length) {
      barEl.className = "bar error";
      magEl.textContent = "—";
      regionEl.textContent = "Sense sismes";
      labelEl.textContent = "últim mes";
      return;
    }

    const maxEvent = features.reduce((a, b) => {
      const magA = Number(a?.properties?.mag) || -999;
      const magB = Number(b?.properties?.mag) || -999;
      return magB > magA ? b : a;
    });

    const p = maxEvent.properties || {};
    const mag = Number(p.mag);

    barEl.className = "bar " + classMag(mag);
    magEl.textContent = Number.isFinite(mag) ? ("M" + mag.toFixed(1)) : "M?";
    regionEl.textContent = tradueixZona(p.flynn_region || p.region || "Catalunya");
    labelEl.textContent = textMag(mag);

    if (mag >= 3) {
      dotEl.classList.add("live");
    }
  } catch (e) {
    barEl.className = "bar error";
    magEl.textContent = "!";
    regionEl.textContent = "Error carregant dades";
    labelEl.textContent = "";
  }
})();
</script>
</body>
</html>
