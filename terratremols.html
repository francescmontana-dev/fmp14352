<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terratrèmols Catalunya</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: transparent;
}

.card{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 14px;
  border-radius:14px;
  background:#f8fafc;
  border:1px solid rgba(0,0,0,.08);
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  max-width:100%;
}

/* magnitud */
.mag{
  font-size:26px;
  font-weight:800;
}

/* colors per magnitud */
.mag.molt-debil{ color:#2563eb; }
.mag.debil{ color:#0891b2; }
.mag.lleu{ color:#d97706; }
.mag.moderat{ color:#b91c1c; }

/* text */
.info{
  flex:1;
  min-width:0;
}

.region{
  font-size:14px;
  font-weight:600;
  color:#111827;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.meta{
  font-size:12px;
  color:#6b7280;
}

/* etiqueta */
.label{
  font-size:11px;
  font-weight:700;
  padding:3px 8px;
  border-radius:999px;
  background:#e5eefc;
  color:#1e3a8a;
  white-space:nowrap;
}
</style>
</head>

<body>
<div class="card">
  <div id="mag" class="mag">--</div>
  <div class="info">
    <div id="region" class="region">Carregant…</div>
    <div id="meta" class="meta"></div>
  </div>
  <div id="label" class="label"></div>
</div>

<script>
(async function () {

  const magEl = document.getElementById("mag");
  const regionEl = document.getElementById("region");
  const metaEl = document.getElementById("meta");
  const labelEl = document.getElementById("label");

  const minLat = 40.5;
  const maxLat = 42.9;
  const minLon = 0.1;
  const maxLon = 3.5;

  const end = new Date();
  const start = new Date();
  start.setMonth(start.getMonth() - 1);

  function pad(n){ return String(n).padStart(2,"0"); }
  function toISO(d){
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  }

  function tradueixZona(zona){
    if (!zona) return "Catalunya";
    zona = zona.toUpperCase();

    if (zona.includes("PYRENEES")) return "Pirineus";
    if (zona.includes("BARCELONA")) return "Barcelona";
    if (zona.includes("GIRONA")) return "Girona";
    if (zona.includes("TARRAGONA")) return "Tarragona";
    if (zona.includes("LLEIDA")) return "Lleida";
    if (zona.includes("MEDITERRANEAN")) return "Mediterrani";

    return zona.charAt(0)+zona.slice(1).toLowerCase();
  }

  function textMag(m){
    if (m < 2) return "molt dèbil";
    if (m < 3) return "dèbil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  function classMag(m){
    if (m < 2) return "molt-debil";
    if (m < 3) return "debil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  try {
    const url =
      "https://www.seismicportal.eu/fdsnws/event/1/query?format=json" +
      "&starttime=" + toISO(start) +
      "&endtime=" + toISO(end) +
      "&minlat=" + minLat +
      "&maxlat=" + maxLat +
      "&minlon=" + minLon +
      "&maxlon=" + maxLon;

    const res = await fetch(url);
    const data = await res.json();
    const features = data.features || [];

    if (!features.length) {
      regionEl.textContent = "Sense sismes aquest mes";
      return;
    }

    const max = features.reduce((a,b) =>
      Number(a.properties.mag) > Number(b.properties.mag) ? a : b
    );

    const p = max.properties;
    const mag = Number(p.mag);

    magEl.textContent = "M" + mag.toFixed(1);
    magEl.classList.add(classMag(mag));

    regionEl.textContent = tradueixZona(p.flynn_region);
    metaEl.textContent = new Date(p.time).toLocaleDateString("ca-ES");

    labelEl.textContent = textMag(mag);

  } catch {
    regionEl.textContent = "Error carregant dades";
  }

})();
</script>
</body>
</html>
