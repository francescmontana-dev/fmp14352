<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: transparent;
}

.container{
  max-width:320px;
  margin:6px auto;
}

.card{
  border-radius:12px;
  padding:10px 12px;
  background:#f8fafc;
  border:1px solid rgba(0,0,0,.08);
  box-shadow: 0 3px 10px rgba(0,0,0,.07);
  text-align:center;
}

.title{
  font-size:11px;
  font-weight:600;
  color:#6b7280;
  margin-bottom:4px;
}

.mag{
  font-size:26px;
  font-weight:800;
  line-height:1;
  margin-bottom:2px;
}

.mag.molt-debil{ color:#2563eb; }
.mag.debil{ color:#0891b2; }
.mag.lleu{ color:#d97706; }
.mag.moderat{ color:#dc2626; }

.label{
  font-size:10px;
  color:#6b7280;
  margin-bottom:4px;
}

.region{
  font-size:12px;
  font-weight:600;
  color:#111827;
}

.meta{
  font-size:10px;
  color:#9ca3af;
  margin-top:3px;
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <div class="title">Terratrèmol més fort</div>
    <div id="mag" class="mag">--</div>
    <div id="label" class="label"></div>
    <div id="region" class="region">Carregant…</div>
    <div id="meta" class="meta"></div>
  </div>
</div>

<script>
(async function () {

  const magEl = document.getElementById("mag");
  const regionEl = document.getElementById("region");
  const metaEl = document.getElementById("meta");
  const labelEl = document.getElementById("label");

  const minLat = 40.5;
  const maxLat = 42.9;
  const minLon = 0.1;
  const maxLon = 3.5;

  const end = new Date();
  const start = new Date();
  start.setMonth(start.getMonth() - 1);

  function pad(n){ return String(n).padStart(2,"0"); }
  function toISO(d){
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  }

  function tradueixZona(z){
    if (!z) return "Catalunya";
    z = z.toUpperCase();

    if (z.includes("PYRENEES")) return "Pirineus";
    if (z.includes("BARCELONA")) return "Barcelona";
    if (z.includes("GIRONA")) return "Girona";
    if (z.includes("TARRAGONA")) return "Tarragona";
    if (z.includes("LLEIDA")) return "Lleida";

    return z.charAt(0)+z.slice(1).toLowerCase();
  }

  function textMag(m){
    if (m < 2) return "molt dèbil";
    if (m < 3) return "dèbil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  function classMag(m){
    if (m < 2) return "molt-debil";
    if (m < 3) return "debil";
    if (m < 4) return "lleu";
    return "moderat";
  }

  try {
    const url =
      "https://www.seismicportal.eu/fdsnws/event/1/query?format=json" +
      "&starttime=" + toISO(start) +
      "&endtime=" + toISO(end) +
      "&minlat=" + minLat +
      "&maxlat=" + maxLat +
      "&minlon=" + minLon +
      "&maxlon=" + maxLon;

    const res = await fetch(url);
    const data = await res.json();
    const features = data.features || [];

    if (!features.length) {
      regionEl.textContent = "Sense sismes";
      return;
    }

    const max = features.reduce((a,b) =>
      Number(a.properties.mag) > Number(b.properties.mag) ? a : b
    );

    const p = max.properties;
    const mag = Number(p.mag);

    magEl.textContent = "M" + mag.toFixed(1);
    magEl.classList.add(classMag(mag));

    regionEl.textContent = tradueixZona(p.flynn_region);
    labelEl.textContent = textMag(mag);
    metaEl.textContent = new Date(p.time).toLocaleDateString("ca-ES");

  } catch {
    regionEl.textContent = "Error";
  }

})();
</script>

</body>
</html>
