<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banner Dashboard 37.6 — El Masnou</title>
  <style>
    body{
      margin:0;
      padding:12px;
      font-family:Arial, Helvetica, sans-serif;
      background:#f4f7fb;
      color:#1f2937;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .banner{
      background:linear-gradient(135deg,#0f172a 0%, #1d4ed8 100%);
      color:#fff;
      border-radius:18px;
      padding:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.14);
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      margin-bottom:4px;
    }

    .subtitle{
      font-size:13px;
      opacity:.9;
    }

    .status{
      font-size:13px;
      opacity:.92;
      text-align:right;
    }

    .main{
      display:grid;
      grid-template-columns:1.15fr 1fr;
      gap:14px;
    }

    .left, .right{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      padding:14px;
      backdrop-filter:blur(3px);
    }

    .temp{
      font-size:38px;
      font-weight:800;
      line-height:1;
      margin-bottom:8px;
    }

    .line{
      font-size:14px;
      margin:6px 0;
      opacity:.98;
    }

    .pill{
      display:inline-block;
      padding:4px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      font-size:12px;
      font-weight:700;
      margin-top:8px;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .mini{
      background:rgba(255,255,255,.10);
      border-radius:12px;
      padding:10px;
    }

    .mini-k{
      font-size:12px;
      opacity:.88;
      margin-bottom:4px;
    }

    .mini-v{
      font-size:17px;
      font-weight:700;
      line-height:1.35;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      padding:11px 14px;
      border-radius:12px;
      font-weight:700;
      font-size:14px;
      transition:.2s ease;
    }

    .btn-primary{
      background:#fff;
      color:#0f172a;
    }

    .btn-secondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    @media (max-width: 760px){
      .main{
        grid-template-columns:1fr;
      }

      .status{
        text-align:left;
      }

      .temp{
        font-size:34px;
      }
    }

    @media (max-width: 480px){
      .banner{
        padding:14px;
      }

      .temp{
        font-size:32px;
      }

      .mini-v{
        font-size:16px;
      }

      .mini{
        padding:8px;
      }

      .btn{
        width:100%;
        text-align:center;
      }

      .buttons{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="banner">
    <div class="top">
      <div>
        <div class="title">🌤️ El Masnou — resum ràpid</div>
        <div class="subtitle">Coherent amb el Dashboard 37.6</div>
      </div>
      <div class="status" id="metaLine">Carregant dades…</div>
    </div>

    <div class="main">
      <div class="left">
        <div class="temp" id="obsTemp">-- °C</div>
        <div class="line" id="obsHum">Humitat: -- %</div>
        <div class="line" id="obsWind">Vent: -- km/h</div>
        <div class="line" id="obsRain">Pluja dia: -- mm</div>
        <div class="pill" id="headlineRain">Proper episodi de pluja: --</div>
      </div>

      <div class="right">
        <div class="mini-grid">
          <div class="mini">
            <div class="mini-k">Pic de vent</div>
            <div class="mini-v" id="headlineWind">--</div>
          </div>

          <div class="mini">
            <div class="mini-k">Previsió ara</div>
            <div class="mini-v" id="prevTemp">-- °C</div>
          </div>

          <div class="mini">
            <div class="mini-k">Mínima prevista</div>
            <div class="mini-v" id="headlineMin">--</div>
          </div>

          <div class="mini">
            <div class="mini-k">Màxima prevista</div>
            <div class="mini-v" id="headlineMax">--</div>
          </div>
        </div>

        <div class="buttons">
          <a class="btn btn-primary" href="https://francescmontana-dev.github.io/fmp14352/dashboard37_6.html" target="_blank" rel="noopener noreferrer">
            Veure dashboard 37.6
          </a>

          <a class="btn btn-secondary" href="https://francescmontana-dev.github.io/fmp14352/dashboard37_6.html" target="_blank" rel="noopener noreferrer">
            Gràfiques i taules
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
const FORECAST_HOURS = 72;
const RAIN_HIGHLIGHT_MM = 0.1;

let lastForecastData = null;
let modelTempCorrection = 0;
let modelForecastTemp = "--";
let learningBias = { h6: 0, h12: 0, h24: 0 };
let learningSamples = { h6: 0, h12: 0, h24: 0 };
window.modelObservedTimeUtc = null;

function loadJSONP(url) {
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  s.async = true;
  document.body.appendChild(s);
}

function setText(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

function asNumber(v, fallback = null) {
  if (v === null || v === undefined || v === "") return fallback;
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function parseUtcForecastTime(s) {
  if (!s) return null;
  const d1 = new Date(s);
  if (!isNaN(d1)) return d1;
  const d2 = new Date(s + "Z");
  return isNaN(d2) ? null : d2;
}

function parseObservedUtc(s) {
  if (!s) return null;
  try {
    const p = s.split(",").map(Number);
    return new Date(Date.UTC(p[0], p[1] - 1, p[2], p[3], p[4], p[5]));
  } catch (e) {
    return null;
  }
}

function getBaseTime() {
  let baseTime = parseObservedUtc(window.modelObservedTimeUtc);
  if (!baseTime) baseTime = new Date();
  return baseTime;
}

function getRowTime(row) {
  return row?.t || row?.time || row?.datetime || null;
}

function getRowTemp(row) {
  return asNumber(row?.temp ?? row?.temperature_c ?? row?.temperature ?? null, null);
}

function getRowWind(row) {
  return asNumber(row?.wind_kmh ?? row?.wind_speed_kmh ?? row?.wind ?? null, null);
}

function getRowRain(row) {
  return asNumber(row?.rain_mm ?? row?.precipitation_mm ?? row?.precipitation ?? null, null);
}

function getLocalHourFromRow(row) {
  const dt = parseUtcForecastTime(getRowTime(row));
  if (!dt) return null;
  return Number(dt.toLocaleString("ca-ES", {
    hour: "2-digit",
    hour12: false,
    timeZone: "Europe/Madrid"
  }));
}

function getHorizonBias(h) {
  let bias = 0;

  if (h === 6 && (learningSamples.h6 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h6 ?? 0));
  } else if (h === 12 && (learningSamples.h12 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h12 ?? 0));
  } else if (h === 24 && (learningSamples.h24 ?? 0) >= 8) {
    bias = Math.max(-1.0, Math.min(1.0, learningBias.h24 ?? 0));
  }

  return bias;
}

function getCurrentCorrection(h) {
  if (h <= 6) return modelTempCorrection * 0.15;
  if (h <= 12) return modelTempCorrection * 0.08;
  if (h <= 24) return modelTempCorrection * 0.05;
  if (h <= 48) return modelTempCorrection * 0.03;
  if (h <= 72) return modelTempCorrection * 0.02;
  return 0;
}

function getLocalAdjustmentForRow(row) {
  const hourLocal = getLocalHourFromRow(row);
  if (hourLocal === null || Number.isNaN(hourLocal)) return 0;

  const wind = getRowWind(row);

  if (hourLocal >= 22 || hourLocal <= 6) {
    if (wind !== null && wind > 10) return 0.5;
    if (wind !== null && wind < 3) return 2.0;
    return 1.2;
  }

  if (hourLocal <= 9) return 0.8;

  return 0.0;
}

function getMarineCorrection(row) {
  const hourLocal = getLocalHourFromRow(row);
  if (hourLocal === null || Number.isNaN(hourLocal)) return 0;

  const rh = asNumber(row?.rh, 0) ?? 0;
  const wind = asNumber(row?.wind_kmh ?? row?.wind_speed_kmh, 0) ?? 0;
  const dir = asNumber(row?.wdir_deg, null);

  let marine = 0;

  if (hourLocal >= 22 || hourLocal <= 6) marine = 2.0;
  else if (hourLocal <= 9) marine = 1.0;

  if (rh >= 80) marine += 1.0;
  else if (rh >= 70) marine += 0.5;

  if (wind < 5) marine += 0.5;

  if (dir !== null && dir >= 45 && dir <= 135) marine += 0.5;

  return marine;
}

function computeOwnTempForHorizon(row, h) {
  const t = getRowTemp(row);
  if (t === null) return null;

  let biasH = 24;
  if (h <= 6) biasH = 6;
  else if (h <= 12) biasH = 12;

  const bias = getHorizonBias(biasH);
  const currentCorrection = getCurrentCorrection(h);
  const localAdjust = getLocalAdjustmentForRow(row);
  const marineCorrection = getMarineCorrection(row);

  return t + currentCorrection + bias + localAdjust + marineCorrection;
}

function computeOwnTempForRow(row, index, baseTime) {
  const dt = parseUtcForecastTime(getRowTime(row));
  const t = getRowTemp(row);
  if (!dt || t === null) return null;

  const horizonHours = Math.max(0, (dt - baseTime) / 3600000);
  return computeOwnTempForHorizon(row, horizonHours);
}

function formatLocalDateTime(iso) {
  const dt = parseUtcForecastTime(iso);
  if (!dt) return "--";
  return dt.toLocaleString("ca-ES", {
    timeZone: "Europe/Madrid",
    weekday: "short",
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function updateHeadlines(rows, baseTime) {
  if (!rows || !rows.length) {
    setText("headlineRain", "--");
    setText("headlineWind", "--");
    setText("headlineMin", "--");
    setText("headlineMax", "--");
    return;
  }

  const futureRows = rows.filter(r => {
    const dt = parseUtcForecastTime(getRowTime(r));
    return dt && dt >= baseTime;
  });

  const rainRow = futureRows.find(r => (getRowRain(r) ?? 0) >= RAIN_HIGHLIGHT_MM);

  if (rainRow) {
    const rain = getRowRain(rainRow);
    setText("headlineRain", `${rain} mm · ${formatLocalDateTime(getRowTime(rainRow))}`);
  } else {
    setText("headlineRain", "No es veu pluja destacable");
  }

  let maxWindRow = null;
  let maxWind = -Infinity;
  futureRows.forEach(r => {
    const w = getRowWind(r);
    if (w !== null && w > maxWind) {
      maxWind = w;
      maxWindRow = r;
    }
  });

  if (maxWindRow) {
    setText("headlineWind", `${maxWind.toFixed(1)} km/h · ${formatLocalDateTime(getRowTime(maxWindRow))}`);
  } else {
    setText("headlineWind", "--");
  }

  let minRow = null;
  let maxRow = null;
  let minTemp = Infinity;
  let maxTemp = -Infinity;

  futureRows.forEach((r, i) => {
    const own = computeOwnTempForRow(r, i, baseTime);
    if (own !== null && own < minTemp) {
      minTemp = own;
      minRow = r;
    }
    if (own !== null && own > maxTemp) {
      maxTemp = own;
      maxRow = r;
    }
  });

  if (minRow) {
    setText("headlineMin", `${minTemp.toFixed(1)} °C · ${formatLocalDateTime(getRowTime(minRow))}`);
  } else {
    setText("headlineMin", "--");
  }

  if (maxRow) {
    setText("headlineMax", `${maxTemp.toFixed(1)} °C · ${formatLocalDateTime(getRowTime(maxRow))}`);
  } else {
    setText("headlineMax", "--");
  }
}

function cbCurrent(data) {
  if (!data || !data.ok) return;

  const obs = data.obs || {};
  const now = data.prev_now || {};
  const updatedAt = data?.source?.forecast_updated_at || null;

  let meta = "Dades carregades correctament";
  if (updatedAt) {
    const d = new Date(updatedAt);
    if (!isNaN(d)) {
      meta = "Actualitzat " + d.toLocaleString("ca-ES", {
        timeZone: "Europe/Madrid"
      });
    }
  }

  setText("metaLine", meta);
  setText("obsHum", `Humitat: ${obs.rh ?? "--"} %`);
  setText("obsWind", `Vent: ${obs.wind_kmh ?? "--"} km/h`);
  setText("obsRain", `Pluja dia: ${obs.rain_day_mm ?? "--"} mm`);
  setText("prevTemp", `${modelForecastTemp} °C`);
}

function cbForecast(data) {
  if (!data || !data.ok || !Array.isArray(data.hourly)) return;

  lastForecastData = data;
  const rows = data.hourly.slice(0, FORECAST_HOURS);
  const baseTime = getBaseTime();
  updateHeadlines(rows, baseTime);
}

function cbModel(data) {
  if (!data || !data.ok) return;

  const realT = data.real?.temperature_c ?? "--";
  const prevT = data.forecast?.temperature_c ?? "--";
  const devT = data.deviation?.temperature_c ?? "--";
  window.modelObservedTimeUtc = data.observed_time_utc || null;

  setText("obsTemp", `${realT} °C`);

  modelForecastTemp = prevT;
  setText("prevTemp", `${modelForecastTemp} °C`);

  if (typeof devT === "number") {
    modelTempCorrection = devT;
  }

  const learn = data.learning;
  if (learn) {
    learningBias = learn.bias_temperature_c || learningBias;
    learningSamples = learn.samples || learningSamples;
  }

  if (lastForecastData && Array.isArray(lastForecastData.hourly)) {
    const rows = lastForecastData.hourly.slice(0, FORECAST_HOURS);
    const baseTime = getBaseTime();
    updateHeadlines(rows, baseTime);
  }
}

loadJSONP(API + "?out=current&callback=cbCurrent");
loadJSONP(API + "?out=forecast&callback=cbForecast");
loadJSONP(API + "?out=model&callback=cbModel");
</script>
</body>
</html>
