<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Cumulus MX Charts</title>

	<link rel="icon" type="image/png" href="images/favicon.png">

	<script src="lib/jquery/jquery-latest.min.js"></script>

	<link href="css/w3Pro.css" rel="stylesheet">
	<link href="css/colours.css" rel="stylesheet">
	<link href="css/mx-templates.css" rel="stylesheet">

	<script src="js/setpagedata.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5/dist/chart.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/luxon@3.7/build/global/luxon.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3/dist/chartjs-adapter-luxon.umd.min.js"></script>
	<script src="js/historiccharts.js"></script>
	<script src="js/chartjsextras.js"></script>

	<style>
		.mx-button {
			margin-bottom: 5px;
			border-radius: 4px;
		}

		/* 🔥 SCROLL NOMÉS VISUAL */
		.chart-scroll {
			overflow-x: auto;
			overflow-y: hidden;
			-webkit-overflow-scrolling: touch;
			touch-action: pan-x;
		}

		/* només en mòbil */
		@media (max-width: 768px) {
			.chart-inner {
				min-width: 980px;
			}
		}
	</style>
</head>

<body>

<div id="Header" class="w3-row w3-top w3-theme-dark w3-theme-bdr">
	<div class="w3-row-padding site-width">
		<div class="at-flex-between" style="align-items:center; flex-wrap:wrap;">
			<img src="images/CumulusMX-Logo.png" class="w3-image logo"/>
		</div>
	</div>
</div>

<div id="Content">

	<div class="w3-row-padding w3-theme-light graphs-width">
		<div class="w3-col l12">
			<h1>Charts based on summary data</h1>
		</div>
	</div>

	<div class="w3-row-padding w3-theme-light graphs-width">
		<div class="w3-col s12">

			<div class="w3-panel w3-card w3-theme-white">

				<figure>
					<div id="chartcontainer" class="chart-wrap">

						<div class="chart-buttons">
							<div id="rangeButtons"></div>
							<div>
								<button id="btnPrint">Print</button>
								<button id="btnFullscreen">Fullscreen</button>
							</div>
						</div>

						<!-- 👇 NOMÉS AIXÒ ÉS NOU -->
						<div class="chart-scroll">
							<div class="chart-inner">

								<div id="mainChartContainer" class="mainChartContainer">
									<canvas id="mainChart"></canvas>
								</div>

							</div>
						</div>

						<div id="navChartContainer" class="navChartContainer">
							<canvas id="navChart"></canvas>
						</div>

					</div>
				</figure>

			</div>

		</div>
	</div>

	<div class="w3-row-padding w3-theme-light graphs-width">
		<div class="w3-col s12">

			<div class="w3-container w3-panel w3-center">

				<div class="w3-bar w3-center">
					<button id="btnTemp" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('temp');">Temperature</button>
					<button id="btnPress" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('press');">Pressure</button>
					<button id="btnWind" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('wind');">Winds</button>
					<button id="btnHum" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('humidity');">Humidity</button>
					<button id="btnRain" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('rain');">Rainfall</button>
					<button id="btnSolar" class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('solar');">Solar Radiation</button>
				</div>

				<p>👉 Move the chart left/right with your finger on mobile</p>

			</div>

		</div>
	</div>

</div>

<div id="Footer" class="w3-row w3-theme-dark w3-theme-bdr">
	<div class="w3-row-padding site-width">
		<p>
			Powered by Cumulus MX
		</p>
	</div>
</div>

</body>
</html>
