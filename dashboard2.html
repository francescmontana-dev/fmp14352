<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tauler Meteo — El Masnou</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0b1020;
--card:#111827;
--muted:#94a3b8;
--text:#e5e7eb;
--grid:rgba(255,255,255,.06);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,Arial;
background:linear-gradient(180deg,#0b1020,#0f172a,#0b1020);
color:var(--text);
padding:12px;
}

.wrap{max-width:980px;margin:auto}

.card{
background:rgba(17,24,39,.92);
border-radius:18px;
padding:12px;
margin-bottom:10px;
}

.top{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.brand{
flex:1 1 260px;
}

.brand h1{
margin:0;
font-size:22px;
font-weight:900;
}

.meta{
font-size:12px;
color:var(--muted);
}

.kpis{
flex:2 1 520px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.kpi{
background:rgba(255,255,255,.04);
border-radius:12px;
padding:10px;
}

.k{font-size:11px;color:var(--muted)}
.v{font-size:18px;font-weight:900}
.s{font-size:11px;color:var(--muted)}

.chartTitle{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:13px;
font-weight:900;
}

.canvasWrap{
height:210px;
}

@media(max-width:720px){
.kpis{grid-template-columns:repeat(2,1fr)}
.canvasWrap{height:190px}
}

</style>
</head>

<body>

<div class="wrap">

<div class="card top">

<div class="brand">
<h1>🌦️ El Masnou - NE</h1>

<div id="currentBig">—</div>

<div class="meta" id="metaLine">
Carregant dades…
</div>

</div>

<div class="kpis">

<div class="kpi">
<div class="k">Temperatura</div>
<div class="v" id="kTemp">—</div>
<div class="s" id="kDeltaT">Δ —</div>
</div>

<div class="kpi">
<div class="k">Humitat</div>
<div class="v" id="kRH">—</div>
<div class="s" id="kDeltaRH">Δ —</div>
</div>

<div class="kpi">
<div class="k">Vent</div>
<div class="v" id="kWind">—</div>
<div class="s" id="kGust">Ratxa —</div>
</div>

<div class="kpi">
<div class="k">Pluja</div>
<div class="v" id="kRain">—</div>
<div class="s" id="kRainSoon">3h —</div>
</div>

</div>

</div>

<div class="card">
<div class="chartTitle">
Temperatura · 48 h
<span id="tNote48"></span>
</div>
<div class="canvasWrap">
<canvas id="cTemp48"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Temperatura · 72 h
<span id="tNote72"></span>
</div>
<div class="canvasWrap">
<canvas id="cTemp72"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Pluja + vent · 48 h
</div>
<div class="canvasWrap">
<canvas id="cRainWind"></canvas>
</div>
</div>

<div class="card">
<div class="chartTitle">
Humitat · 48 h
</div>
<div class="canvasWrap">
<canvas id="cRH"></canvas>
</div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec"

function loadJSONP(url){
const s=document.createElement("script")
s.src=url+"&_="+Date.now()
document.body.appendChild(s)
}

function fmt1(x){
return (typeof x==="number")?(Math.round(x*10)/10).toFixed(1):"—"
}

function fmt0(x){
return (typeof x==="number")?Math.round(x):"—"
}

function ddhh(t){
return new Date(t).toLocaleString("ca-ES",{weekday:"short",hour:"2-digit"})
}

function hhmm(t){
return new Date(t).toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"})
}

let chartTemp48
let chartTemp72
let chartRainWind
let chartRH

function commonOpts(unit){
return{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{grid:{color:"rgba(255,255,255,.06)"}},
y:{title:{display:true,text:unit}}
}
}
}

window.cbCurrent=function(data){

const obs=data.obs||{}
const prev=data.prev_now||{}
const dT=(obs.temp&&prev.temp)?obs.temp-prev.temp:null
const dRH=(obs.rh&&prev.rh)?obs.rh-prev.rh:null

kTemp.textContent=fmt1(obs.temp)+"°C"
kRH.textContent=fmt0(obs.rh)+"%"
kWind.textContent=fmt0(obs.wind_kmh)+" km/h"
kGust.textContent="Ratxa "+fmt0(obs.gust_kmh)+" km/h"
kRain.textContent=fmt1(obs.rain_day_mm)+" mm"
kRainSoon.textContent="3h "+fmt1(data.derived?.rain_3h_mm)+" mm"

kDeltaT.textContent="Δ "+(dT?fmt1(dT):"—")
kDeltaRH.textContent="Δ "+(dRH?fmt0(dRH):"—")

metaLine.textContent=
"Actualitzat: "+new Date().toLocaleString("ca-ES")
}

window.cbForecast=function(data){

const h48=data.hourly.slice(0,48)
const h72=data.hourly.slice(0,72)

const labels48=h48.map(x=>ddhh(x.t))
const labels72=h72.map(x=>ddhh(x.t))

const temp48=h48.map(x=>x.temp)
const temp72=h72.map(x=>x.temp)
const rain=h48.map(x=>x.rain_mm)
const wind=h48.map(x=>x.wind_kmh)
const rh=h48.map(x=>x.rh)

if(chartTemp48)chartTemp48.destroy()
if(chartTemp72)chartTemp72.destroy()
if(chartRainWind)chartRainWind.destroy()
if(chartRH)chartRH.destroy()

chartTemp48=new Chart(cTemp48,{
type:"line",
data:{labels:labels48,datasets:[{data:temp48,tension:.35}]},
options:commonOpts("°C")
})

chartTemp72=new Chart(cTemp72,{
type:"line",
data:{labels:labels72,datasets:[{data:temp72,tension:.35}]},
options:commonOpts("°C")
})

chartRainWind=new Chart(cRainWind,{
data:{
labels:labels48,
datasets:[
{type:"bar",data:rain},
{type:"line",data:wind,yAxisID:"y2"}
]},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{title:{display:true,text:"mm/h"}},
y2:{position:"right",title:{display:true,text:"km/h"}}
}}
})

chartRH=new Chart(cRH,{
type:"line",
data:{labels:labels48,datasets:[{data:rh,tension:.35}]},
options:commonOpts("%")
})

tNote48.textContent="de "+hhmm(h48[0].t)+" a "+hhmm(h48[47].t)
tNote72.textContent="de "+hhmm(h72[0].t)+" a "+hhmm(h72[71].t)

}

loadJSONP(API+"?out=current&callback=cbCurrent")
loadJSONP(API+"?out=forecast&callback=cbForecast")

</script>

</body>
</html>
