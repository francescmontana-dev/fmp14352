name: Actualizar sismo El Masnou

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v5

      - name: Generar JSON de prueba con un sismo cercano
        run: |
          mkdir -p data
          cat > data/sismo.json <<'EOF'
          [
            {
              "id": "test-elmasnou-001",
              "fecha": "18/03/2026 14:32",
              "fecha_utc": "18/03/2026 13:32",
              "latitud": "41.5000",
              "longitud": "2.3500",
              "profundidad": "10.0",
              "magnitud": "2.3",
              "tipo_magnitud": "mb",
              "intensidad": "",
              "localizacion": "Costa de Barcelona"
            }
          ]
          EOF

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sismo.json
          git diff --cached --quiet || git commit -m "Actualiza datos sísmicos"
          git push
