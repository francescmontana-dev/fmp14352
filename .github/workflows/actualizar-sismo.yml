name: Actualizar sismo El Masnou

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v5

      - name: Generar JSON local
        run: |
          mkdir -p data
          cat > data/sismo.json <<'EOF'
          []
          EOF

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sismo.json
          git diff --cached --quiet || git commit -m "Actualiza datos sísmicos"
          git push
          
