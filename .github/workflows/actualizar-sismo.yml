name: Actualizar sismo El Masnou

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-sismo-main
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Generar i pujar JSON via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json
          import re
          import base64
          import urllib.request
          import urllib.parse

          # ---------- 1) Llegir dades de l'IGN ----------
          url = "https://www.ign.es/web/ultimos-terremotos/-/ultimos-terremotos/get10dias"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          html = urllib.request.urlopen(req, timeout=30).read().decode("utf-8", errors="ignore")

          filas = re.findall(r'es\\d+.*?\\+\\s+info:', html, re.DOTALL)
          datos = []

          for f in filas:
              try:
                  partes = f.split()
                  evid = partes[0]
                  fecha = partes[1]
                  hora = partes[2]
                  lat = partes[4]
                  lon = partes[5]
                  prof = partes[6]
                  mag = partes[7]
                  loc = " ".join(partes[9:-2])

                  datos.append({
                      "id": evid,
                      "fecha": f"{fecha} {hora}",
                      "fecha_utc": f"{fecha} {hora}",
                      "latitud": lat,
                      "longitud": lon,
                      "profundidad": prof,
                      "magnitud": mag,
                      "tipo_magnitud": "mb",
                      "intensidad": "",
                      "localizacion": loc.strip()
                  })
              except:
                  continue

          contenido = json.dumps(datos, ensure_ascii=False, indent=2) + "\\n"
          contenido_b64 = base64.b64encode(contenido.encode("utf-8")).decode("ascii")

          # ---------- 2) Llegir SHA actual del fitxer ----------
          import os
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]

          api_url = f"https://api.github.com/repos/{repo}/contents/data/sismo.json"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "github-actions"
          }

          sha = None
          try:
              req_get = urllib.request.Request(api_url, headers=headers, method="GET")
              with urllib.request.urlopen(req_get, timeout=30) as r:
                  actual = json.loads(r.read().decode("utf-8"))
                  sha = actual.get("sha")
          except Exception:
              sha = None

          # ---------- 3) Actualitzar el fitxer ----------
          payload = {
              "message": "Update sismo",
              "content": contenido_b64,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha

          data = json.dumps(payload).encode("utf-8")
          req_put = urllib.request.Request(api_url, data=data, headers=headers, method="PUT")
          with urllib.request.urlopen(req_put, timeout=30) as r:
              print(r.read().decode("utf-8"))
          PY
