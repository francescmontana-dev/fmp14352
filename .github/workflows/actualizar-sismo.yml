name: Actualizar sismo El Masnou

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generar JSON robusto
        run: |
          mkdir -p data
          python3 << 'PY'
          import json
          import re
          from urllib.request import Request, urlopen

          url = "https://www.ign.es/web/ultimos-terremotos/-/ultimos-terremotos/get10dias"
          req = Request(url, headers={"User-Agent": "Mozilla/5.0"})
          html = urlopen(req).read().decode("utf-8", errors="ignore")

          # Captura más flexible
          filas = re.findall(r'es\d+.*?\+\s+info:', html, re.DOTALL)

          datos = []

          for f in filas:
              try:
                  partes = f.split()

                  evid = partes[0]
                  fecha = partes[1]
                  hora = partes[2]

                  lat = partes[4]
                  lon = partes[5]
                  prof = partes[6]
                  mag = partes[7]

                  loc = " ".join(partes[9:-2])

                  datos.append({
                      "id": evid,
                      "fecha": f"{fecha} {hora}",
                      "fecha_utc": f"{fecha} {hora}",
                      "latitud": lat,
                      "longitud": lon,
                      "profundidad": prof,
                      "magnitud": mag,
                      "tipo_magnitud": "mb",
                      "intensidad": "",
                      "localizacion": loc.strip()
                  })

              except:
                  continue

          with open("data/sismo.json", "w") as f:
              json.dump(datos, f, indent=2)
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add data/sismo.json
          git commit -m "Update sismo" || echo "No changes"
          git push
