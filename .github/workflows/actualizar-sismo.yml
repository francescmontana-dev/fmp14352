name: Actualizar sismo El Masnou

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complet
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generar JSON robusto
        run: |
          mkdir -p data
          python3 << 'PY'
          import json
          import re
          from urllib.request import Request, urlopen

          url = "https://www.ign.es/web/ultimos-terremotos/-/ultimos-terremotos/get10dias"
          req = Request(url, headers={"User-Agent": "Mozilla/5.0"})
          html = urlopen(req, timeout=30).read().decode("utf-8", errors="ignore")

          filas = re.findall(r'es\d+.*?\+\s+info:', html, re.DOTALL)
          datos = []

          for f in filas:
              try:
                  partes = f.split()

                  evid = partes[0]
                  fecha = partes[1]
                  hora = partes[2]
                  lat = partes[4]
                  lon = partes[5]
                  prof = partes[6]
                  mag = partes[7]
                  loc = " ".join(partes[9:-2])

                  datos.append({
                      "id": evid,
                      "fecha": f"{fecha} {hora}",
                      "fecha_utc": f"{fecha} {hora}",
                      "latitud": lat,
                      "longitud": lon,
                      "profundidad": prof,
                      "magnitud": mag,
                      "tipo_magnitud": "mb",
                      "intensidad": "",
                      "localizacion": loc.strip()
                  })
              except:
                  continue

          with open("data/sismo.json", "w", encoding="utf-8") as f:
              json.dump(datos, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit i push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/sismo.json

          if git diff --cached --quiet; then
            echo "No hi ha canvis"
            exit 0
          fi

          git commit -m "Update sismo"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "Reintent $i..."
            sleep 5
          done
