<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>Dashboard 23 — Source Check</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#f4f7fb;padding:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center}
th{background:#eee}
</style>
</head>
<body>

<h2>Source Check — Forecast brut vs propi</h2>

<table>
<thead>
<tr>
<th>Hora</th>
<th>Temp API</th>
<th>Temp pròpia</th>
<th>Diferència</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";

function loadJSONP(url) {
  const s = document.createElement("script");
  s.src = url + "&_=" + Date.now();
  document.body.appendChild(s);
}

function hh(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"});
}

function cbForecast(data){
  if(!data || !data.hourly) return;

  const rows = data.hourly.slice(0,24);
  const tbody = document.getElementById("tbl");

  tbody.innerHTML = rows.map(r=>{
    const t = Number(r.temp);
    const own = t + 2; // simple offset per veure diferència
    const diff = (own - t).toFixed(1);

    return `<tr>
      <td>${hh(r.t)}</td>
      <td>${t}</td>
      <td>${own.toFixed(1)}</td>
      <td>${diff}</td>
    </tr>`;
  }).join("");
}

loadJSONP(API + "?out=forecast&callback=cbForecast");
</script>

</body>
</html>
