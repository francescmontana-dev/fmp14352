<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<style>
/* ===== GOOGLE SITES / IFRAME FIX ===== */
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:transparent;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}
.wrapper{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== THEME VARS ===== */
:root{
  --c1:#0b2d5c;
  --c2:#1565c0;
  --chip:rgba(255,255,255,.15);
  --shadow:0 12px 28px rgba(0,0,0,.28);
}

/* ===== CARD ===== */
.card{

/* AUTO SIZE */
width:min(92vw,420px);
aspect-ratio:1 / 1;

border-radius:22px;
padding:14px;
display:flex;
flex-direction:column;
justify-content:space-between;

color:white;
background:linear-gradient(160deg,var(--c1),var(--c2));

box-shadow:var(--shadow);
transition: background 650ms ease, box-shadow 650ms ease;
box-sizing:border-box;
}

/* ===== ALERT PULSE ===== */
@keyframes alertPulse{
  0%{ box-shadow:0 12px 28px rgba(0,0,0,.28); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,.45); }
  100%{ box-shadow:0 12px 28px rgba(0,0,0,.28); }
}
.alertActive{
  animation: alertPulse 3s ease-in-out infinite;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.stationWrap{
  min-width:0;
  display:flex;
  align-items:center;
  gap:6px;
}
.station{
  font-weight:750;
  font-size:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.badge{
  display:inline-block;
  font-size:12px;
  padding:3px 7px;
  border-radius:10px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(6px);
  white-space:nowrap;
  opacity:.95;
}
.badge.ok{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.10);
  opacity:.82;
}

.logo{
  width:30px;
  height:30px;
  object-fit:contain;
  background:white;
  border-radius:6px;
  padding:2px;
  flex:0 0 auto;
}

/* ===== TEMP ===== */
.temp{
  font-size:52px;
  font-weight:850;
  text-align:center;
  letter-spacing:-1px;
  line-height:1;
}

/* ===== TRENDS ===== */
.trends{
  margin-top:-6px;
  display:flex;
  justify-content:center;
  gap:8px;
  font-size:12px;
  opacity:.98;
}
.trendChip{
  background: rgba(255,255,255,.12);
  border-radius:999px;
  padding:4px 8px;
  backdrop-filter: blur(6px);
  white-space:nowrap;
}
.trArrow{
  font-weight:900;
  margin-left:6px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.box{
  background:var(--chip);
  border-radius:12px;
  padding:6px;
  text-align:center;
  backdrop-filter: blur(6px);
}
.label{
  font-size:11px;
  opacity:.82;
  margin-top:2px;
}

/* ===== FOOTER ===== */
.footer{
  font-size:11px;
  text-align:center;
  opacity:.92;
  line-height:1.35;
}
#clock{
  font-weight:700;
  letter-spacing:1px;
}
.sunrow{
  margin-top:2px;
  opacity:.95;
}

/* ===== WIND ARROW ===== */
.windRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.arrow{
  display:inline-block;
  font-size:14px;
  transform: rotate(0deg);
  transition: transform 500ms ease;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.18));
}
</style>
</head>

<body>
<div class="wrapper">

  <div class="card" id="card">

    <div class="header">
      <div class="stationWrap">
        <div class="station" id="title">⏳ El Masnou NE</div>
        <span class="badge ok" id="alertBadge">✅ Sense alertes</span>
      </div>

      <img class="logo"
        src="https://francescmontana-dev.github.io/fmp14352/LOGO%20A%20TAMA%C3%91O%20WEB.png"
        alt="Logo estació">
    </div>

    <div class="temp">
      <span id="temp">--</span>°C
    </div>

    <div class="trends">
      <div class="trendChip">🌡️ <span id="tTrend">--</span><span class="trArrow" id="tArrow">→</span> <span style="opacity:.85">1h</span></div>
      <div class="trendChip">📈 <span id="pTrend">--</span><span class="trArrow" id="pArrow">→</span> <span style="opacity:.85">3h</span></div>
    </div>

    <div class="grid">
      <div class="box">
        <div id="hum">--</div>
        <div class="label">Humitat</div>
      </div>

      <div class="box">
        <div class="windRow">
          <span class="arrow" id="wArrow">➤</span>
          <span id="wind">--</span>
        </div>
        <div class="label">Vent</div>
      </div>

      <div class="box">
        <div id="rain">--</div>
        <div class="label">Pluja avui</div>
      </div>

      <div class="box">
        <div id="press">--</div>
        <div class="label">Pressió</div>
      </div>
    </div>

    <div class="footer">
      📅 <span id="date">--</span>
      &nbsp;•&nbsp; Actualitzat <span id="time">--:--</span>
      <br>
      🕒 <span id="clock">--:--:--</span>
      <div class="sunrow">🌅 <span id="sunrise">--:--</span> &nbsp; 🌇 <span id="sunset">--:--</span></div>
    </div>

  </div>
</div>

<script>
(() => {
  const realtimeURL = "https://francescmontana-dev.github.io/fmp14352/realtime.txt";

  // Coordenades (aprox) El Masnou
  const LAT = 41.4798;
  const LON = 2.3188;

  // Historial (tendències reals)
  const STORAGE_KEY = "elmasnou_hist_pro_v1";
  const KEEP_MS = 4 * 60 * 60 * 1000;        // 4h
  const TARGET_TEMP_MS = 60 * 60 * 1000;     // 1h
  const TARGET_PRESS_MS = 3 * 60 * 60 * 1000;// 3h
  const TOL_MS = 12 * 60 * 1000;             // ±12 min

  const el = (id) => document.getElementById(id);
  const pad2 = (n) => String(n).padStart(2, "0");
  const num = (s) => {
    const x = parseFloat(String(s ?? "").replace(",", "."));
    return Number.isFinite(x) ? x : null;
  };

  /* ===== DATA / RELLOTGE ===== */
  function updateDate(){
    const now = new Date();
    el("date").textContent = now.toLocaleDateString("ca-ES", {
      weekday:"short", day:"numeric", month:"short", year:"numeric"
    });
  }
  function updateClock(){
    const now = new Date();
    el("clock").textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  }

  /* ===== DIA / NIT (per paleta; simple) ===== */
  function isDayByHour(hour){
    return Number.isFinite(hour) ? (hour >= 7 && hour < 20) : true;
  }

  /* ===== COLOR SEGONS TEMP (+ nit més fosc) ===== */
  function setThemeByTemp(tempC, day){
    const t = (tempC == null) ? 18 : tempC;

    // DIA
    let dayC1="#0b2d5c", dayC2="#1565c0";
    if (t < 5)      { dayC1="#05224a"; dayC2="#1e88e5"; }
    else if (t < 12){ dayC1="#06315f"; dayC2="#1aa3b3"; }
    else if (t < 20){ dayC1="#0b2d5c"; dayC2="#2e7d32"; }
    else if (t < 28){ dayC1="#0b2d5c"; dayC2="#f9a825"; }
    else            { dayC1="#2b0d2a"; dayC2="#e53935"; }

    // NIT
    let nightC1="#050716", nightC2="#2b2a6f";
    if (t < 5)      { nightC1="#040716"; nightC2="#0b3a6a"; }
    else if (t < 12){ nightC1="#050716"; nightC2="#0a4f5a"; }
    else if (t < 20){ nightC1="#050716"; nightC2="#134a2a"; }
    else if (t < 28){ nightC1="#050716"; nightC2="#5a3e0a"; }
    else            { nightC1="#12030f"; nightC2="#6a0d0d"; }

    document.documentElement.style.setProperty("--c1", day ? dayC1 : nightC1);
    document.documentElement.style.setProperty("--c2", day ? dayC2 : nightC2);
    document.documentElement.style.setProperty("--chip", day ? "rgba(255,255,255,.15)" : "rgba(255,255,255,.10)");
  }

  /* ===== ICONA METEO (pluja/boira/vent + sol/lluna) ===== */
  function meteoTitle(rainRate, hum, gust, day){
    if (rainRate != null && rainRate > 0) return "🌧️ El Masnou NE";
    if (hum != null && hum >= 95 && (gust != null && gust < 5)) return "🌫️ El Masnou NE";
    if (gust != null && gust >= 35) return "💨 El Masnou NE";
    return day ? "☀️ El Masnou NE" : "🌙 El Masnou NE";
  }

  /* ===== DIRECCIÓ VENT ===== */
  function setWindArrow(bearingDeg){
    if (bearingDeg == null) return;
    el("wArrow").style.transform = `rotate(${bearingDeg}deg)`;
  }

  /* ===== SOL (NOAA-style) ===== */
  function sunTimes(date, lat, lon) {
    const rad = Math.PI / 180;
    const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const start = new Date(day.getFullYear(), 0, 0);
    const doy = Math.floor((day - start) / 86400000);
    const lngHour = lon / 15;

    function calc(isSunrise) {
      const t = doy + ((isSunrise ? 6 : 18) - lngHour) / 24;
      const M = (0.9856 * t) - 3.289;

      let L = M + (1.916 * Math.sin(M * rad)) + (0.020 * Math.sin(2 * M * rad)) + 282.634;
      L = (L + 360) % 360;

      let RA = Math.atan(0.91764 * Math.tan(L * rad)) / rad;
      RA = (RA + 360) % 360;

      const Lq  = Math.floor(L / 90) * 90;
      const RAq = Math.floor(RA / 90) * 90;
      RA = (RA + (Lq - RAq)) / 15;

      const sinDec = 0.39782 * Math.sin(L * rad);
      const cosDec = Math.cos(Math.asin(sinDec));

      const zenith = 90.833;
      const cosH = (Math.cos(zenith * rad) - (sinDec * Math.sin(lat * rad))) / (cosDec * Math.cos(lat * rad));
      if (cosH > 1 || cosH < -1) return null;

      let H = isSunrise ? (360 - (Math.acos(cosH) / rad)) : (Math.acos(cosH) / rad);
      H = H / 15;

      const T = H + RA - (0.06571 * t) - 6.622;

      let UT = (T - lngHour) % 24;
      if (UT < 0) UT += 24;

      const utc = new Date(Date.UTC(day.getFullYear(), day.getMonth(), day.getDate(), 0, 0, 0));
      utc.setUTCHours(Math.floor(UT), Math.floor((UT % 1) * 60), 0, 0);
      return utc;
    }

    return { sunrise: calc(true), sunset: calc(false) };
  }

  function fmtHM(dateObj){
    if(!dateObj) return "--:--";
    const d = new Date(dateObj);
    return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }

  function updateSun(){
    const now = new Date();
    const st = sunTimes(now, LAT, LON);
    el("sunrise").textContent = fmtHM(st.sunrise);
    el("sunset").textContent  = fmtHM(st.sunset);
  }

  /* ===== HISTORIAL / TENDÈNCIES REALS ===== */
  function loadHist(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }

  function saveHist(arr){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }catch(e){}
  }

  function pushReading(tempC, press, ts){
    if (tempC == null || press == null) return;
    let hist = loadHist();
    hist.push({ ts, tempC, press });
    hist = hist.filter(p => (ts - p.ts) <= KEEP_MS);
    if(hist.length > 500) hist = hist.slice(hist.length - 500);
    saveHist(hist);
  }

  function closestTo(hist, targetTs){
    let best = null;
    let bestDt = Infinity;
    for (const p of hist){
      const dt = Math.abs(p.ts - targetTs);
      if(dt < bestDt){
        bestDt = dt;
        best = p;
      }
    }
    return (best && bestDt <= TOL_MS) ? best : null;
  }

  function arrowForDelta(delta, thr){
    if (delta == null) return "→";
    if (delta > thr) return "↑";
    if (delta < -thr) return "↓";
    return "→";
  }

  function formatDelta(delta, unit){
    if (delta == null) return "--";
    const sign = delta > 0 ? "+" : "";
    return `${sign}${delta.toFixed(1)} ${unit}`;
  }

  function updateTrendsReal(nowTs, tempC, press){
    const hist = loadHist();
    const p1h = closestTo(hist, nowTs - TARGET_TEMP_MS);
    const p3h = closestTo(hist, nowTs - TARGET_PRESS_MS);

    const dT = (p1h && tempC != null) ? (tempC - p1h.tempC) : null;
    const dP = (p3h && press != null) ? (press - p3h.press) : null;

    const THR_T = 0.2; // °C
    const THR_P = 0.5; // hPa

    el("tTrend").textContent = formatDelta(dT, "°C");
    el("pTrend").textContent = formatDelta(dP, "hPa");

    el("tArrow").textContent = arrowForDelta(dT, THR_T);
    el("pArrow").textContent = arrowForDelta(dP, THR_P);
  }

  /* ===== ALERTES + "SENSE ALERTES" ===== */
  function setAlert(tempC, rainRate, gust){
    const badge = el("alertBadge");
    const card  = el("card");

    let text = "";
    // llindars acordats:
    if (gust != null && gust >= 45) text = "💨 Vent fort";
    else if (rainRate != null && rainRate >= 5) text = "🌧️ Pluja intensa";
    else if (tempC != null && tempC >= 30) text = "🔥 Calor";
    else if (tempC != null && tempC <= 0) text = "🧊 Gel";

    if (text){
      badge.textContent = text;
      badge.classList.remove("ok");
      card.classList.add("alertActive");
    }else{
      badge.textContent = "✅ Sense alertes";
      badge.classList.add("ok");
      card.classList.remove("alertActive");
    }
  }

  /* ===== LOAD CUMULUS realtime.txt ===== */
  async function load(){
    const r = await fetch(realtimeURL + "?t=" + Date.now(), { cache: "no-store" });
    const text = await r.text();
    const d = text.trim().split(/\s+/);

    // format esperat:
    // 0 date, 1 time, 2 temp, 3 hum, 5 wind, 6 gust, 7 bearing, 8 rainRate, 9 rainToday, 10 pressure
    const nowTs = Date.now();

    const timeStr = (d[1] ?? "").substring(0,5);
    const hour = Number.isFinite(parseInt(timeStr.split(":")[0],10)) ? parseInt(timeStr.split(":")[0],10) : null;

    const tempC = num(d[2]);
    const humNum = num(d[3]);
    const gust = num(d[6]);
    const bearing = num(d[7]);
    const rainRate = num(d[8]);
    const pressNum = num(d[10]);

    // UI
    el("temp").textContent  = d[2] ?? "--";
    el("hum").textContent   = (d[3] ?? "--") + " %";
    el("wind").textContent  = (d[5] ?? "--") + " km/h";
    el("rain").textContent  = (d[9] ?? "--") + " mm";
    el("press").textContent = (d[10] ?? "--") + " hPa";
    el("time").textContent  = timeStr || "--:--";

    const day = isDayByHour(hour);
    setThemeByTemp(tempC, day);
    el("title").textContent = meteoTitle(rainRate, humNum, gust, day);
    setWindArrow(bearing);

    // Tendències reals
    pushReading(tempC, pressNum, nowTs);
    updateTrendsReal(nowTs, tempC, pressNum);

    // Alertes
    setAlert(tempC, rainRate, gust);
  }

  // START
  updateDate();
  updateClock();
  updateSun();
  load().catch(()=>{});

  setInterval(load, 30000);
  setInterval(updateClock, 1000);
  setInterval(updateDate, 60000);
  setInterval(updateSun, 10 * 60 * 1000);
})();
</script>
</body>
</html>
