<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taula previsió — El Masnou</title>

  <style>
    :root{
      --bg:#0b1020;
      --card:#111827;
      --muted:#94a3b8;
      --text:#e5e7eb;
      --line:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
      background:linear-gradient(180deg,#0b1020 0%, #0f172a 45%, #0b1020 100%);
      color:var(--text);
      padding:12px;
    }
    .wrap{max-width:980px;margin:auto;}
    .card{
      background:rgba(17,24,39,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:12px;
      box-shadow:0 14px 34px rgba(0,0,0,.28);
      margin-bottom:10px;
    }
    .head{
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
      align-items:baseline;
    }
    h1{margin:0;font-size:18px;font-weight:950;}
    .meta{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.3;}
    .btn{
      display:inline-block;
      padding:8px 12px;
      border-radius:12px;
      background:rgba(96,165,250,.20);
      border:1px solid rgba(96,165,250,.40);
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .tableWrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px;}
    table{
      width:100%;
      min-width:760px;
      border-collapse:collapse;
      font-size:12px;
      border-radius:14px;
      overflow:hidden;
    }
    th{
      text-align:center;
      padding:8px;
      background:rgba(255,255,255,.06);
      border-bottom:1px solid var(--line);
      white-space:nowrap;
      font-weight:900;
    }
    td{
      text-align:center;
      padding:7px;
      border-bottom:1px solid rgba(255,255,255,.06);
      white-space:nowrap;
    }
    tr:nth-child(even){background:rgba(255,255,255,.03);}
    .wx{font-size:16px;}
    @media (max-width: 720px){
      table{min-width:680px;}
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <h1>📋 Taula previsió · El Masnou - NE (72 h)</h1>
      <a class="btn" href="./dashboard.html">⬅ Tornar a gràfiques</a>
    </div>
    <div class="meta" id="metaLine">Carregant dades…</div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Temps</th><th>Hora</th><th>Temp</th><th>Pluja</th><th>Vent</th><th>Dir</th><th>Humitat</th>
          </tr>
        </thead>
        <tbody id="tbody72">
          <tr><td colspan="7">Carregant…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ✅ DATA_BASE (la teva URL /exec)
  const DATA_BASE = "https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";
  const END_FORECAST = `${DATA_BASE}?out=forecast&callback=cbForecast`;

  const fmt1 = (x) => (x === null || x === undefined || Number.isNaN(x)) ? "—" : (Math.round(x*10)/10).toFixed(1);

  const hhmm = (iso) => iso ? new Date(iso).toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit"}) : "—";

  function loadJSONP(url){
    const s = document.createElement("script");
    s.src = url + "&_=" + Date.now();
    s.async = true;
    s.onerror = () => {
      document.getElementById("metaLine").textContent = "❌ Error carregant dades (JSONP). A Firefox: desactiva l'escut per aquest lloc.";
    };
    document.body.appendChild(s);
  }

  function dayKey_(iso){
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${da}`;
  }

  function dayLabel_(iso){
    const d = new Date(iso);
    return d.toLocaleDateString("ca-ES", { weekday:"long", day:"2-digit", month:"short" });
  }

  function windArrow(deg){
    if(deg === null || deg === undefined || Number.isNaN(deg)) return "";
    const d = ((deg % 360) + 360) % 360;
    if (d >= 337.5 || d < 22.5)   return "↑";
    if (d >= 22.5  && d < 67.5)   return "↗";
    if (d >= 67.5  && d < 112.5)  return "→";
    if (d >= 112.5 && d < 157.5)  return "↘";
    if (d >= 157.5 && d < 202.5)  return "↓";
    if (d >= 202.5 && d < 247.5)  return "↙";
    if (d >= 247.5 && d < 292.5)  return "←";
    return "↖";
  }

  function wxIcon(symbol){
    const s = String(symbol || "").toLowerCase();
    if(!s) return "•";
    if (s.includes("thunder")) return "⛈️";
    if (s.includes("snow")) return "❄️";
    if (s.includes("sleet")) return "🌨️";
    if (s.includes("fog")) return "🌫️";
    if (s.includes("rain")) return "🌧️";
    if (s.includes("showers")) return "🌦️";
    if (s.includes("cloudy")) return "☁️";
    if (s.includes("partlycloudy")) return "🌤️";
    if (s.includes("clearsky")) return "☀️";
    return "🌤️";
  }

  window.cbForecast = (data) => {
    const hourly = Array.isArray(data?.hourly) ? data.hourly : [];
    const h = hourly.slice(0, 72);

    const tbody = document.getElementById("tbody72");
    if(!h.length){
      tbody.innerHTML = `<tr><td colspan="7">Sense dades</td></tr>`;
      document.getElementById("metaLine").textContent = "Sense dades.";
      return;
    }

    document.getElementById("metaLine").textContent =
      `Met.no actualitzat: ${data?.updated_at || "—"} · Mostrant ${h.length} hores`;

    const groups = new Map();
    for(const p of h){
      const k = dayKey_(p.t);
      if(!groups.has(k)) groups.set(k, []);
      groups.get(k).push(p);
    }

    let html = "";

    for(const [k, arr] of groups.entries()){
      let tmin = null, tmax = null, rainSum = 0;

      for(const p of arr){
        if(typeof p.temp === "number"){
          tmin = (tmin === null) ? p.temp : Math.min(tmin, p.temp);
          tmax = (tmax === null) ? p.temp : Math.max(tmax, p.temp);
        }
        if(typeof p.rain_mm === "number") rainSum += p.rain_mm;
      }

      // ✅ línia gruixuda de separació + resum diari
      html += `
        <tr>
          <td colspan="7" style="
            text-align:left;
            font-weight:950;
            background:rgba(255,255,255,.08);
            border-top:4px solid rgba(255,255,255,.18);
            border-bottom:2px solid rgba(255,255,255,.14);
          ">
            📅 ${dayLabel_(arr[0].t)} · Tmin ${fmt1(tmin)}° / Tmax ${fmt1(tmax)}° · 🌧️ ${fmt1(rainSum)} mm
          </td>
        </tr>
      `;

      html += arr.map(p => {
        const w = (p.wind_kmh == null) ? "—" : `${Math.round(p.wind_kmh)} km/h`;
        const r = (p.rain_mm == null) ? 0 : p.rain_mm;
        const rh = (p.rh == null) ? "—" : `${Math.round(p.rh)}%`;
        const t = (p.temp == null) ? "—" : `${fmt1(p.temp)}°`;
        const rainStyle = (r >= 0.2) ? "font-weight:950;" : "opacity:.9;";

        return `
          <tr>
            <td class="wx">${wxIcon(p.symbol)}</td>
            <td>${hhmm(p.t)}</td>
            <td>${t}</td>
            <td style="${rainStyle}">${fmt1(r)}</td>
            <td>${w}</td>
            <td>${windArrow(p.wdir_deg)}</td>
            <td>${rh}</td>
          </tr>
        `;
      }).join("");
    }

    tbody.innerHTML = html;
  };

  loadJSONP(END_FORECAST);
</script>
</body>
</html>
