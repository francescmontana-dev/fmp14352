<!DOCTYPE html>
<html lang="ca">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Gràfiques meteorològiques</title>
	<link rel="icon" type="image/png" href="images/favicon.png">

	<script src="lib/jquery/jquery-latest.min.js"></script>

	<link href="css/w3Pro.css" rel="stylesheet">
	<link href="css/colours.css" rel="stylesheet">
	<link href="css/mx-templates.css" rel="stylesheet">

	<script src="js/setpagedata.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5/dist/chart.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/luxon@3.7/build/global/luxon.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3/dist/chartjs-adapter-luxon.umd.min.js"></script>
	<script src="js/historiccharts.js"></script>
	<script src="js/chartjsextras.js"></script>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
		}

		.mx-button {
			margin-bottom: 5px;
			border-radius: 4px;
		}

		/* 🔥 SCROLL CONTROLAT */
		.chart-scroll {
			width: 100%;
			overflow-x: auto;
			overflow-y: hidden;
			-webkit-overflow-scrolling: touch;
		}

		.chart-scroll canvas {
			display: block;
			width: 100% !important;
			height: auto !important;
		}

		@media (max-width: 768px) {
			.chart-scroll canvas {
				min-width: 820px;
			}

			.w3-bar .w3-bar-item {
				display: block;
				width: 100%;
				margin-bottom: 8px;
			}
		}
	</style>
</head>

<body>

<div class="w3-container w3-theme-light">
	<h2 style="text-align:center;">Gràfiques meteorològiques</h2>
</div>

<div class="w3-container">

	<div class="w3-panel w3-card w3-theme-white">

		<div id="chartcontainer">

			<div class="chart-buttons">
				<div id="rangeButtons"></div>
				<div>
					<button id="btnPrint">Print</button>
					<button id="btnFullscreen">Fullscreen</button>
				</div>
			</div>

			<div class="chart-scroll">
				<div id="mainChartContainer" class="mainChartContainer">
					<canvas id="mainChart"></canvas>
				</div>
			</div>

			<div id="navChartContainer">
				<canvas id="navChart"></canvas>
			</div>

		</div>

	</div>

	<div class="w3-container w3-center">

		<div class="w3-bar w3-center">
			<button class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('temp')">Temperatura</button>
			<button class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('press')">Pressió</button>
			<button class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('wind')">Vent</button>
			<button class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('humidity')">Humitat</button>
			<button class="w3-bar-item w3-btn w3-theme-l2 mx-button" onclick="changeGraph('rain')">Pluja</button>
		</div>

		<p style="margin-top:10px;">
			Mou la gràfica amb el dit ➡️
		</p>

		<a href="inicio.html"
		   style="
		   display:block;
		   max-width:320px;
		   margin:20px auto;
		   padding:14px;
		   background:#1e73be;
		   color:#fff;
		   text-decoration:none;
		   border-radius:12px;
		   font-weight:bold;
		   ">
		   ⬅ Tornar
		</a>

	</div>

</div>

</body>
</html>
