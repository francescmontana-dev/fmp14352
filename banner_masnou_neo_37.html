<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  padding:10px;
  font-family:Arial;
  background:#f4f7fb;
}
.wrap{max-width:560px;margin:auto;}

.banner{
  background:linear-gradient(135deg,#0f172a,#1d4ed8);
  color:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.title{font-size:20px;font-weight:700;}
.meta{font-size:11px;opacity:.8;margin-bottom:8px;}

.temp{font-size:40px;font-weight:800;}

.line{font-size:13px;margin:3px 0;}

.days{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}
.day{
  background:rgba(255,255,255,.12);
  padding:8px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
}

.text{
  margin-top:12px;
  background:rgba(255,255,255,.1);
  padding:10px;
  border-radius:10px;
  font-size:13px;
  line-height:1.5;
}

.buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.btn{
  flex:1;
  text-align:center;
  background:#fff;
  color:#111;
  padding:10px;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
}
.btn2{
  background:rgba(255,255,255,.2);
  color:#fff;
}
</style>
</head>

<body>
<div class="wrap">
<div class="banner">

<div class="title">🌤️ El Masnou NE</div>
<div class="meta" id="meta">Carregant…</div>

<div class="temp" id="temp">--</div>

<div class="line" id="hum">--</div>
<div class="line" id="wind">--</div>
<div class="line" id="rain">--</div>

<div class="days" id="days"></div>

<div class="text" id="textForecast">Carregant predicció…</div>

<div class="buttons">
<a class="btn" href="https://francescmontana-dev.github.io/fmp14352/grafica_propia_actual_3dies.html" target="_blank">Gràfica</a>
<a class="btn btn2" href="https://francescmontana-dev.github.io/fmp14352/taula_previsio_propia_3dies.html" target="_blank">Taula</a>
</div>

</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwf9li15OfcuVCuoiCX3RYnJp67LJnNAXRQXMhgIMhB5G45ujRz5HUncihurI1BfUN6cA/exec";

let forecastData=null;
let currentTemp=null;

/* helpers */
function load(u){let s=document.createElement("script");s.src=u+"&_="+Date.now();document.body.appendChild(s);}
function t(r){return new Date(r.t);}
function temp(r){return r.temp;}
function wind(r){return r.wind_kmh;}
function rain(r){return r.rain_mm||0;}
function r1(v){return Math.round(v*10)/10;}

/* CURRENT */
function cbCurrent(d){
 if(!d||!d.ok)return;
 const o=d.obs||{};
 currentTemp=Number(o.temp);

 document.getElementById("temp").textContent=r1(currentTemp)+" °C";
 document.getElementById("hum").textContent="Humitat "+o.rh+" %";
 document.getElementById("wind").textContent="Vent "+o.wind_kmh+" km/h";
 document.getElementById("rain").textContent="Pluja "+o.rain_day_mm+" mm";

 document.getElementById("meta").textContent="Actualitzat "+new Date().toLocaleString("ca-ES");
}

/* FORECAST */
function cbForecast(d){
 if(!d||!d.ok)return;
 forecastData=d;
 buildAll();
}

/* BUILD */
function buildAll(){
 if(!forecastData||!currentTemp)return;

 const rows=forecastData.hourly.slice(0,72);
 const base=new Date();

 /* 3 blocs */
 const blocks=[
  {l:"24 h",f:0,t:24},
  {l:"48 h",f:24,t:48},
  {l:"72 h",f:48,t:72}
 ];

 document.getElementById("days").innerHTML=blocks.map(b=>{
  const part=rows.filter(r=>{
   const h=(t(r)-base)/3600000;
   return h>=b.f && h<b.t;
  });

  const temps=part.map(r=>temp(r)).filter(v=>v!=null);
  const rains=part.map(r=>rain(r));
  const winds=part.map(r=>wind(r)).filter(v=>v!=null);

  if(!temps.length)return `<div class="day">--</div>`;

  return `<div class="day">
  <b>${b.l}</b><br>
  ${r1(Math.max(...temps))}° / ${r1(Math.min(...temps))}°<br>
  ${r1(rains.reduce((a,b)=>a+b,0))} mm<br>
  ${winds.length?Math.max(...winds):"--"} km/h
  </div>`;
 }).join("");

 /* TEXT PRO */
 const next24=rows.filter(r=>{
  const h=(t(r)-base)/3600000;
  return h>=0&&h<24;
 });

 const temps=next24.map(r=>temp(r));
 const rains=next24.map(r=>rain(r));
 const winds=next24.map(r=>wind(r)).filter(v=>v!=null);

 const tMin=r1(Math.min(...temps,currentTemp));
 const tMax=r1(Math.max(...temps,currentTemp));
 const rainTot=r1(rains.reduce((a,b)=>a+b,0));
 const windMax=winds.length?Math.max(...winds):0;

 let txt="Temps estable.";
 if(rainTot>1) txt="Temps variable amb ruixats.";
 if(rainTot>5) txt="Temps insegur amb pluja destacable.";
 if(windMax>30) txt="Ambient ventós.";

 document.getElementById("textForecast").innerHTML=
 `${txt} La temperatura actual és de ${r1(currentTemp)} °C i es mourà entre ${tMin} °C i ${tMax} °C. `+
 (rainTot>0?`Pluja aproximada de ${rainTot} mm. `:"Sense precipitació destacable. ")+
 `Vent fins a ${windMax} km/h.`;
}

/* LOAD */
load(API+"?out=current&callback=cbCurrent");
load(API+"?out=forecast&callback=cbForecast");
</script>
</body>
</html>
